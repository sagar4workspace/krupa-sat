<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SAT MASTER PREP</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#080c16;--surface:#0f1623;--surface2:#161f30;--border:#1e3050;--border2:#2a4268;
  --gold:#f5c842;--gold2:#d4a800;--blue:#4f8ef7;--red:#ef4444;--green:#22c55e;--purple:#a855f7;--orange:#f97316;
  --text:#eef2ff;--text2:#8fa3c0;--text3:#4a6080;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.hidden{display:none!important;}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
#authWrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:var(--bg);background-image:radial-gradient(ellipse 60% 50% at 15% 50%,rgba(245,200,66,.06) 0,transparent 100%),radial-gradient(ellipse 50% 60% at 85% 20%,rgba(79,142,247,.06) 0,transparent 100%);}
.acard{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 34px;width:100%;max-width:430px;box-shadow:0 40px 80px rgba(0,0,0,.7);animation:up .4s ease both;}
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.abrand{text-align:center;margin-bottom:26px;}
.abrand .alogo{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:900;color:var(--gold);}
.abrand .alogo em{font-style:normal;font-family:'Plus Jakarta Sans',sans-serif;font-weight:300;font-size:1rem;color:var(--text2);letter-spacing:3px;margin-left:4px;}
.abrand p{color:var(--text3);font-size:0.8rem;margin-top:5px;}
.amsg{padding:10px 14px;border-radius:10px;font-size:0.81rem;margin-bottom:14px;text-align:center;line-height:1.5;}
.amsg.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5;}
.amsg.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#86efac;}
.fld{margin-bottom:14px;}.fld label{display:block;font-size:0.7rem;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.fld .iw{position:relative;}
.fld input{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.88rem;transition:.14s;}
.fld input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,200,66,.1);}
.eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:.85rem;opacity:.5;}.eye:hover{opacity:1;}
.abtn{width:100%;padding:12px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border:none;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.87rem;font-weight:700;cursor:pointer;transition:.16s;margin-top:6px;}
.abtn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(245,200,66,.28);}
.abtn2{width:100%;padding:11px;background:transparent;color:var(--text2);border:1px solid var(--border);border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.84rem;font-weight:500;cursor:pointer;transition:.16s;}
.abtn2:hover{border-color:var(--gold);color:var(--gold);}
.adiv{text-align:center;color:var(--text3);font-size:.72rem;margin:14px 0 10px;position:relative;}
.adiv::before,.adiv::after{content:'';position:absolute;top:50%;width:38%;height:1px;background:var(--border);}
.adiv::before{left:0}.adiv::after{right:0}
.flink{text-align:center;margin-top:8px;}.flink button{background:none;border:none;color:var(--text3);font-size:.74rem;cursor:pointer;font-family:inherit;text-decoration:underline;}.flink button:hover{color:var(--gold);}
.otpbox{font-family:'Playfair Display',serif;font-size:2.5rem;font-weight:700;color:var(--gold);letter-spacing:10px;text-align:center;background:var(--surface2);border:1px solid var(--border2);border-radius:12px;padding:18px;margin-bottom:6px;}
.otpnote{font-size:.7rem;color:var(--text3);text-align:center;margin-bottom:14px;}
#app{display:flex;flex-direction:column;min-height:100vh;}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 26px;position:sticky;top:0;z-index:300;}
.hlogo{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--gold);cursor:pointer;}
.hlogo em{font-style:normal;font-family:'Plus Jakarta Sans',sans-serif;font-weight:300;font-size:.85rem;color:var(--text2);letter-spacing:2px;margin-left:4px;}
.uchip{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:30px;padding:5px 12px 5px 6px;}

.uname{font-size:.78rem;font-weight:600;}.urole{font-size:.56rem;background:var(--gold);color:#000;padding:1px 6px;border-radius:8px;font-weight:700;}
.sout{background:none;border:1px solid var(--border);color:var(--text3);padding:3px 9px;border-radius:6px;cursor:pointer;font-size:.68rem;font-family:inherit;transition:.13s;}.sout:hover{border-color:var(--red);color:var(--red);}
.nav{background:var(--surface);border-bottom:1px solid var(--border);display:flex;padding:0 16px;overflow-x:auto;}.nav::-webkit-scrollbar{height:2px;}
.ntab{padding:13px 18px;color:var(--text3);font-size:.73rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:.15s;white-space:nowrap;font-family:inherit;display:flex;align-items:center;gap:6px;}
.ntab:hover{color:var(--text);}.ntab.act{color:var(--gold);border-bottom-color:var(--gold);}
.nbdg{font-size:.57rem;padding:2px 7px;border-radius:10px;font-weight:700;background:var(--gold);color:#000;}
#mc{flex:1;max-width:1080px;margin:0 auto;width:100%;padding:26px 18px;}
.dhero{text-align:center;padding:28px 0 18px;animation:up .5s ease both;}
.dhero h1{font-family:'Playfair Display',serif;font-size:2.6rem;font-weight:900;line-height:1.1;}.dhero h1 span{color:var(--gold);}
.dhero p{color:var(--text2);margin-top:8px;font-size:.88rem;max-width:460px;margin-inline:auto;line-height:1.7;}
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px 22px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:18px;}
.pavt{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:#000;flex-shrink:0;}
.pinfo{flex:1;min-width:160px;}.pname{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;}.pmeta{font-size:.74rem;color:var(--text2);margin-top:2px;}
.pbadges{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.pb{font-size:.6rem;padding:3px 9px;border-radius:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
.pb-gold{background:rgba(245,200,66,.15);color:var(--gold);border:1px solid rgba(245,200,66,.3);}
.pb-blue{background:rgba(79,142,247,.15);color:var(--blue);border:1px solid rgba(79,142,247,.3);}
.pb-green{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);}
.pright{text-align:right;}.pright .big{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--gold);}.pright .lbl{font-size:.64rem;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;}
.gbar{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px 24px;margin-bottom:18px;display:flex;gap:22px;align-items:center;flex-wrap:wrap;}
.gscore{font-family:'Playfair Display',serif;font-size:2.6rem;font-weight:700;color:var(--gold);line-height:1;}.glbl{font-size:.64rem;color:var(--text3);text-transform:uppercase;letter-spacing:.9px;margin-top:3px;}
.gpbar{flex:1;min-width:180px;}.gpbar-track{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin:6px 0;}.gpbar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold2),var(--gold));transition:width .9s ease;}
.gstats{display:flex;gap:18px;flex-wrap:wrap;}.gst{text-align:center;}.gst-n{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700;}.gst-l{font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;margin:18px 0;}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px 18px;cursor:pointer;transition:.2s;position:relative;overflow:hidden;animation:up .5s ease both;}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--ac);}
.scard:hover{transform:translateY(-4px);border-color:var(--ac);box-shadow:0 14px 40px rgba(0,0,0,.5);}
.scard .si{font-size:1.7rem;margin-bottom:10px;}.scard h3{font-family:'Playfair Display',serif;font-size:1.18rem;font-weight:700;margin-bottom:4px;}
.scard p{font-size:.77rem;color:var(--text2);line-height:1.55;margin-bottom:14px;}
.sprog{display:flex;justify-content:space-between;align-items:flex-end;}.spn{font-family:'Playfair Display',serif;font-size:1.45rem;font-weight:700;}.spl{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;}
.sbar{height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden;}.sbar-fill{height:100%;border-radius:2px;transition:width .6s ease;}
.shdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.shdr h2{font-family:'Playfair Display',serif;font-size:1.65rem;font-weight:700;}.shdr p{color:var(--text2);font-size:.78rem;margin-top:3px;}
.sbox{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 15px;text-align:center;min-width:100px;}
.sbig{font-family:'Playfair Display',serif;font-size:1.45rem;font-weight:700;color:var(--gold);}.slbl{font-size:.6rem;color:var(--text3);letter-spacing:1px;text-transform:uppercase;}
.mgrid{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;margin-bottom:20px;}
.mc2{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 3px;text-align:center;cursor:pointer;transition:.13s;position:relative;}
.mc2:hover{transform:translateY(-2px);border-color:var(--ac);}.mc2.done{border-color:var(--green);background:rgba(34,197,94,.06);}.mc2.actv{border-color:var(--gold);background:rgba(245,200,66,.07);}
.mc2 .mn{font-family:'Playfair Display',serif;font-size:.9rem;font-weight:700;}.mc2 .ms{font-size:.52rem;margin-top:1px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);font-weight:600;}
.mc2.done .mn{color:var(--green);}.mc2.done .ms{color:var(--green);}.mc2 .msc{font-size:.52rem;color:var(--gold);font-weight:700;margin-top:1px;}
.mc2.done::after{content:'✓';position:absolute;top:2px;right:4px;font-size:.58rem;color:var(--green);font-weight:700;}
.epanel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;animation:up .3s ease both;}
.eptop{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.eptop h3{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;}
.etag{font-size:.6rem;padding:3px 10px;border-radius:20px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;}
.etag-rw{background:rgba(79,142,247,.15);color:var(--blue);border:1px solid rgba(79,142,247,.3);}
.etag-m{background:rgba(249,115,22,.15);color:var(--orange);border:1px solid rgba(249,115,22,.3);}
.etag-w{background:rgba(168,85,247,.15);color:var(--purple);border:1px solid rgba(168,85,247,.3);}
.etag-l{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);}
.psg{background:var(--bg);border-left:3px solid var(--ac);padding:16px 20px;border-radius:0 8px 8px 0;font-size:.86rem;line-height:1.9;color:#b8cce0;margin-bottom:16px;max-height:300px;overflow-y:auto;}
.psg p+p{margin-top:10px;}
.qblk{margin-bottom:16px;}
.qlbl{font-weight:600;font-size:.84rem;margin-bottom:7px;display:flex;gap:7px;line-height:1.55;}
.qnum{display:inline-flex;align-items:center;justify-content:center;background:var(--ac);color:#000;width:20px;height:20px;min-width:20px;border-radius:50%;font-size:.62rem;font-weight:700;margin-top:2px;flex-shrink:0;}
.opts{display:flex;flex-direction:column;gap:5px;margin-top:5px;}
.opt{display:flex;align-items:center;gap:9px;padding:9px 12px;border:1px solid var(--border);border-radius:7px;cursor:pointer;font-size:.82rem;transition:.11s;color:var(--text);user-select:none;}
.opt:hover{border-color:var(--ac);background:rgba(255,255,255,.025);}.opt.sel{border-color:var(--blue);background:rgba(79,142,247,.08);}
.opt.correct{border-color:var(--green)!important;background:rgba(34,197,94,.09)!important;color:var(--green);}
.opt.wrong{border-color:var(--red)!important;background:rgba(239,68,68,.07)!important;color:#fca5a5;}
.oltr{width:22px;height:22px;border-radius:50%;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:.63rem;font-weight:700;flex-shrink:0;}
.tinp{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:inherit;font-size:.84rem;transition:.12s;margin-top:5px;}
.tinp:focus{outline:none;border-color:var(--ac);}.tinp.ok{border-color:var(--green)!important;background:rgba(34,197,94,.05);}.tinp.no{border-color:var(--red)!important;background:rgba(239,68,68,.05);}
.mbox{background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:13px 16px;margin-bottom:12px;font-size:.87rem;line-height:1.85;color:#b8cce0;}.mbox strong{color:var(--gold);}
.wprompt{background:var(--bg);border-left:3px solid var(--purple);padding:14px 18px;border-radius:0 8px 8px 0;font-size:.85rem;line-height:1.75;color:#b8cce0;margin-bottom:12px;}
textarea.wta{width:100%;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:.84rem;line-height:1.7;resize:vertical;min-height:160px;transition:.12s;}
textarea.wta:focus{outline:none;border-color:var(--purple);}
.wcnt{font-size:.7rem;color:var(--text3);text-align:right;margin-top:3px;}
.wtip{padding:7px 11px;border-radius:6px;font-size:.77rem;line-height:1.5;margin-bottom:5px;background:rgba(34,197,94,.07);border-left:3px solid var(--green);color:var(--text2);}
.btn{padding:10px 20px;border-radius:7px;font-family:inherit;font-size:.8rem;font-weight:700;cursor:pointer;border:none;transition:.15s;}
.btn-g{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;}.btn-g:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(245,200,66,.3);}
.btn-gh{background:transparent;color:var(--text3);border:1px solid var(--border);}.btn-gh:hover{border-color:var(--text2);color:var(--text);}
.brow{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;}
.rbox{margin-top:14px;padding:18px;border-radius:12px;border:1px solid;animation:up .3s ease both;}
.rbox.good{border-color:var(--green);background:rgba(34,197,94,.06);}.rbox.mid{border-color:var(--gold);background:rgba(245,200,66,.06);}.rbox.low{border-color:var(--red);background:rgba(239,68,68,.06);}
.rdisplay{display:flex;gap:20px;align-items:center;flex-wrap:wrap;margin-bottom:10px;}
.rscore{font-family:'Playfair Display',serif;font-size:2.5rem;font-weight:700;line-height:1;}
.stbl{width:100%;border-collapse:collapse;font-size:.78rem;margin-top:10px;}.stbl th{background:var(--surface2);color:var(--gold);padding:7px 10px;text-align:left;border-bottom:1px solid var(--border);}.stbl td{padding:7px 10px;border-bottom:1px solid var(--border);}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;margin:14px 0;}
.pgitem{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 4px;text-align:center;}
.pgitem.pgd{border-color:var(--green);background:rgba(34,197,94,.05);}
.pgnum{font-family:'Playfair Display',serif;font-size:.9rem;font-weight:700;color:var(--text3);}.pgitem.pgd .pgnum{color:var(--green);}
.pgscore{font-size:.65rem;font-weight:700;color:var(--gold);margin-top:1px;}.pgmax{font-size:.56rem;color:var(--text3);}
.psec{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;}
.psec h3{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;margin-bottom:4px;}
.prow{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;align-items:center;justify-content:space-between;}
.pstat-n{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;}.pstat-l{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;}
.ptrack{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin:10px 0;}.pfill{height:100%;border-radius:3px;transition:width .7s ease;}
.explain{padding:7px 11px;border-radius:6px;font-size:.77rem;line-height:1.5;margin-top:6px;background:rgba(79,142,247,.07);border-left:3px solid var(--blue);color:var(--text2);}
@media(max-width:680px){.mgrid{grid-template-columns:repeat(5,1fr);}.dhero h1{font-size:1.9rem;}#mc{padding:14px 10px;}.hdr{padding:0 14px;}.acard{padding:28px 20px;}}
</style>

<body>
<div id="authWrap" class="hidden"></div>
<div id="app" class="hidden">
  <header class="hdr">
    <div class="hlogo" onclick="goHome()">SAT <em>MASTER</em></div>
    <div id="uchip"></div>
  </header>
  <nav class="nav">
    <button class="ntab act" id="nt0" onclick="goSec('home')">🏠 Dashboard</button>
    <button class="ntab" id="nt1" onclick="goSec('rw')">📖 Reading &amp; Writing <span class="nbdg" id="rwb">0/50</span></button>
    <button class="ntab" id="nt2" onclick="goSec('math')">🔢 Math <span class="nbdg" style="background:var(--orange);color:#fff" id="mb">0/50</span></button>
    <button class="ntab" id="nt3" onclick="goSec('writing')">✍️ Essay <span class="nbdg" style="background:var(--purple)" id="wb">0/50</span></button>
    <button class="ntab" id="nt4" onclick="goSec('lang')">📝 Language <span class="nbdg" style="background:var(--green);color:#fff" id="lb">0/50</span></button>
    <button class="ntab" id="nt5" onclick="goSec('progress')">📊 My Scores</button>
  </nav>
  <div id="mc"></div>
</div>
<script>
// ═══════════════════════════════════════════════════════════
// READING & WRITING — 50 FULLY UNIQUE MODULES
// ═══════════════════════════════════════════════════════════
const RW=[
{t:"The Rise of Electric Vehicles",p:`The electric vehicle (EV) industry has undergone a remarkable transformation since 2020. Battery costs have fallen by over 89% in the past decade, making EVs cost-competitive with gasoline-powered cars in many markets. Major automakers including Ford, General Motors, and Volkswagen have pledged to phase out internal combustion engines entirely by 2035.\n\nHowever, significant challenges remain. The charging infrastructure, while expanding rapidly, still lags behind the ubiquity of gas stations in rural areas. Range anxiety — the concern that a vehicle will run out of charge before reaching a destination — continues to influence purchasing decisions. Additionally, electricity used to charge EVs in many regions still comes predominantly from fossil fuels, raising questions about the net environmental benefit.\n\nDespite these obstacles, global EV sales surpassed 10 million units in 2022 for the first time, representing 14% of all new car sales worldwide. China leads the market, accounting for roughly 60% of global EV sales, driven by strong government subsidies and a robust domestic manufacturing ecosystem.`,
qs:[{t:"mcq",q:"According to the passage, what is 'range anxiety'?",o:["Fear of driving at high speeds","Concern a vehicle will run out of charge","Anxiety about traveling long distances","Worry about battery explosions"],a:"Concern a vehicle will run out of charge"},
{t:"mcq",q:"By how much have battery costs fallen in the past decade?",o:["Over 50%","Over 70%","Over 89%","Over 95%"],a:"Over 89%"},
{t:"mcq",q:"What percentage of new car sales did EVs represent globally in 2022?",o:["7%","10%","14%","20%"],a:"14%"},

{t:"The Psychology of Decision-Making",p:`Behavioral economists have long recognized that human decision-making deviates systematically from the rational model assumed by classical economics. Nobel laureate Daniel Kahneman identified two systems of thinking: System 1, which is fast, intuitive, and emotional, and System 2, which is slow, deliberate, and logical. Most everyday decisions rely on System 1, making people susceptible to predictable cognitive biases.\n\nOne of the most studied biases is loss aversion — the tendency for people to feel the pain of a loss approximately twice as intensely as the pleasure of an equivalent gain. This asymmetry explains why investors hold onto losing stocks too long and why retailers use "limited time offer" framing to drive purchases.\n\nAnchoringis another powerful bias where the first piece of information encountered exerts disproportionate influence on subsequent judgments. Experiments show that when people are asked to estimate a quantity after seeing an arbitrary number, their estimates cluster around that number. Retailers exploit anchoring by showing inflated "original prices" next to sale prices, making discounts appear more valuable.`,
qs:[{t:"mcq",q:"What did Daniel Kahneman identify as the two systems of thinking?",o:["Conscious and unconscious systems","Rational and irrational systems","Fast intuitive and slow deliberate systems","Emotional and logical systems only"],a:"Fast intuitive and slow deliberate systems"},
{t:"mcq",q:"How much more intensely do people feel losses compared to equivalent gains?",o:["Equally","Approximately 1.5 times","Approximately twice","Approximately three times"],a:"Approximately twice"},
{t:"mcq",q:"What is 'anchoring' as described in the passage?",o:["Fixing prices permanently","The first piece of information exerting disproportionate influence","A method of rational decision-making","The tendency to avoid losses"],a:"The first piece of information exerting disproportionate influence"},
{t:"mcq",q:"How do retailers exploit anchoring according to the passage?",o:["By offering genuine discounts","By showing inflated original prices next to sale prices","By limiting product availability","By using emotional advertising"],a:"By showing inflated original prices next to sale prices"},
{t:"short",q:"What award did Daniel Kahneman receive?",a:"Nobel Prize / Nobel laureate"}],ms:50},

{t:"Ocean Acidification and Marine Life",p:`As carbon dioxide levels rise in Earth's atmosphere, the oceans are absorbing approximately one-third of all CO₂ emitted by human activities. When CO₂ dissolves in seawater, it forms carbonic acid, lowering the ocean's pH. Since pre-industrial times, ocean surface pH has dropped from 8.2 to 8.1 — a seemingly small change that represents a 26% increase in acidity, because pH is measured on a logarithmic scale.\n\nThe effects on marine ecosystems are already measurable. Many marine organisms including corals, oysters, sea urchins, and pteropods — tiny free-swimming sea snails that form a crucial part of food webs — build their shells and skeletons from calcium carbonate. As acidity increases, calcium carbonate dissolves more readily, making it harder for these organisms to build and maintain their structures. Laboratory studies show that oyster larvae raised in more acidic conditions have significantly thinner shells and higher mortality rates.\n\nThe potential cascading effects through marine food chains are deeply concerning to scientists. If pteropod populations collapse, the species that depend on them — including salmon, mackerel, and baleen whales — face significant disruption to their food supply.`,
qs:[{t:"mcq",q:"What fraction of human CO₂ emissions do the oceans absorb?",o:["One-quarter","One-third","One-half","Two-thirds"],a:"One-third"},
{t:"mcq",q:"By how much has ocean acidity increased since pre-industrial times?",o:["10%","16%","26%","36%"],a:"26%"},
{t:"mcq",q:"What are pteropods?",o:["Small fish species","Tiny free-swimming sea snails","A type of coral","Marine bacteria"],a:"Tiny free-swimming sea snails"},
{t:"mcq",q:"Why does the drop from pH 8.2 to 8.1 represent a 26% increase in acidity?",o:["Because it is a large numerical change","Because pH uses a logarithmic scale","Because carbonic acid is very strong","Because CO₂ is a strong acid"],a:"Because pH uses a logarithmic scale"},
{t:"short",q:"What chemical forms when CO₂ dissolves in seawater?",a:"carbonic acid"}],ms:50},

{t:"Urban Heat Islands and City Planning",p:`Urban areas are significantly warmer than surrounding rural regions — a phenomenon known as the urban heat island (UHI) effect. In major cities, temperatures can be 3 to 12 degrees Fahrenheit higher than nearby rural areas, particularly at night. This thermal difference arises from the replacement of vegetation with heat-absorbing concrete, asphalt, and dark roofing materials, as well as heat generated by vehicles, air conditioning units, and industrial processes.\n\nThe consequences extend beyond mere discomfort. During heat waves, urban residents — especially elderly populations, infants, and those without access to air conditioning — face elevated risks of heat-related illness and death. The 2003 European heat wave, which killed an estimated 70,000 people, disproportionately affected elderly urban residents in dense city centers.\n\nCity planners are responding with several evidence-based interventions. Green roofs covered with vegetation can reduce rooftop temperatures by up to 90°F compared to conventional dark roofs. Urban tree canopy coverage reduces ambient temperatures by providing shade and through evapotranspiration. Several cities including Singapore, Copenhagen, and Melbourne have set ambitious targets for urban tree coverage and cooling infrastructure, demonstrating that thoughtful design can meaningfully mitigate heat island effects.`,
qs:[{t:"mcq",q:"By how many degrees Fahrenheit can cities be warmer than rural areas?",o:["1 to 5 degrees","3 to 12 degrees","5 to 20 degrees","10 to 15 degrees"],a:"3 to 12 degrees"},
{t:"mcq",q:"How many people did the 2003 European heat wave kill?",o:["An estimated 7,000","An estimated 30,000","An estimated 70,000","An estimated 100,000"],a:"An estimated 70,000"},
{t:"mcq",q:"By how much can green roofs reduce rooftop temperatures compared to dark conventional roofs?",o:["Up to 30°F","Up to 50°F","Up to 70°F","Up to 90°F"],a:"Up to 90°F"},
{t:"mcq",q:"What two mechanisms do urban trees use to reduce temperatures?",o:["Absorption and reflection","Shade and evapotranspiration","Insulation and cooling","Photosynthesis and respiration"],a:"Shade and evapotranspiration"},
{t:"short",q:"What is the term for the phenomenon where cities are significantly warmer than surrounding rural areas?",a:"urban heat island / UHI effect"}],ms:50},

{t:"The Microbiome and Human Health",p:`The human body hosts approximately 37 trillion human cells, yet harbors nearly equal numbers of microbial cells — bacteria, fungi, and archaea — primarily in the gastrointestinal tract. This community of microorganisms, collectively called the microbiome, is increasingly recognized as a critical determinant of human health and disease.\n\nThe gut microbiome performs essential metabolic functions that the human body cannot perform on its own. These include breaking down dietary fiber into short-chain fatty acids that fuel intestinal cells, synthesizing certain vitamins including vitamin K and several B vitamins, and training the immune system to distinguish between harmless and harmful foreign substances.\n\nResearch published in top medical journals has linked microbiome disruption — called dysbiosis — to conditions ranging from inflammatory bowel disease and obesity to depression and autism spectrum disorder. The gut-brain axis, a bidirectional communication network linking the gastrointestinal tract and central nervous system, helps explain psychological effects of gut health. One notable study demonstrated that transferring fecal microbiota from anxiety-prone mice to previously calm mice caused behavioral changes in the recipient animals.`,
qs:[{t:"mcq",q:"Approximately how many human cells does the body contain?",o:["37 million","370 million","37 trillion","370 trillion"],a:"37 trillion"},
{t:"mcq",q:"What are short-chain fatty acids mentioned in the passage?",o:["Dietary supplements","Products of dietary fiber breakdown that fuel intestinal cells","Vitamins synthesized by the microbiome","Components of the gut-brain axis"],a:"Products of dietary fiber breakdown that fuel intestinal cells"},
{t:"mcq",q:"What is the term for microbiome disruption?",o:["Dysbiosis","Microbiosis","Eubiosis","Symbiosis"],a:"Dysbiosis"},
{t:"mcq",q:"What did the fecal microbiota transfer experiment demonstrate?",o:["That anxiety is purely genetic","That gut bacteria can influence behavior","That mice cannot experience anxiety","That brain bacteria affect digestion"],a:"That gut bacteria can influence behavior"},
{t:"short",q:"What is the gut-brain axis?",a:"bidirectional communication network linking gastrointestinal tract and central nervous system"}],ms:50},

{t:"Antibiotic Resistance: A Growing Crisis",p:`Antimicrobial resistance (AMR) has been called one of the most urgent health threats of the 21st century. Every year, drug-resistant infections kill an estimated 700,000 people globally — a figure that the United Nations projects could rise to 10 million annual deaths by 2050 if current trends continue, exceeding current cancer mortality.\n\nAntibiotics kill susceptible bacteria, but those with genetic mutations conferring resistance survive and reproduce, passing resistance genes to offspring and even horizontally to other bacterial species. Overuse and misuse of antibiotics — in both human medicine and agriculture, where they are widely used as growth promoters — accelerates this evolutionary process by dramatically increasing selection pressure.\n\nThe pipeline of new antibiotics has nearly dried up. Since 1987, no new class of antibiotics has been successfully developed and brought to market. The economics are unfavorable: antibiotics are typically short-course treatments taken for days, making them far less profitable than medications for chronic conditions. Several policy interventions are being explored, including government-funded research incentives, restrictions on agricultural antibiotic use, and international cooperation frameworks to ensure that existing antibiotics are used judiciously.`,
qs:[{t:"mcq",q:"How many people do drug-resistant infections kill each year currently?",o:["Approximately 70,000","Approximately 700,000","Approximately 7 million","Approximately 10 million"],a:"Approximately 700,000"},

{t:"mcq",q:"Why are antibiotics economically unattractive to develop?",o:["They are too expensive to manufacture","They are short-course treatments, making them less profitable than chronic disease drugs","They require too many clinical trials","They cannot be patented"],a:"They are short-course treatments, making them less profitable than chronic disease drugs"},
{t:"short",q:"What term is used for antimicrobial resistance?",a:"AMR / antimicrobial resistance"}],ms:50},

{t:"CRISPR Gene Editing Technology",p:`CRISPR-Cas9 has transformed molecular biology since its development as a gene-editing tool in 2012 by Jennifer Doudna and Emmanuelle Charpentier, who shared the 2020 Nobel Prize in Chemistry for this work. CRISPR — Clustered Regularly Interspaced Short Palindromic Repeats — is a naturally occurring immune defense system found in bacteria that scientists have engineered into a precise molecular scissors capable of cutting DNA at specific locations.\n\nThe technology works by using a guide RNA molecule to direct the Cas9 protein to a specific sequence of DNA, where it makes a precise cut. The cell's natural repair mechanisms then either disable the gene at that location or, if a DNA template is provided, incorporate new genetic sequences. This process allows scientists to delete, correct, or insert genes with unprecedented precision and at a fraction of the cost and time required by previous genetic engineering methods.\n\nCRISPR holds enormous therapeutic potential. Early clinical trials have shown remarkable results for sickle cell disease and beta-thalassemia. However, concerns persist about off-target edits — unintended cuts elsewhere in the genome — and the ethical implications of germline editing, which would create heritable genetic changes in all future descendants.`,

{t:"mcq",q:"What does CRISPR stand for?",o:["Clustered Regularly Interspaced Short Palindromic Repeats","Complex RNA Integrated Sequencing Protein Repair","Cellular RNA Integrated Sequencing Protocol Replacement","Coded Repeat Insertion Sequence Protein"],a:"Clustered Regularly Interspaced Short Palindromic Repeats"},
{t:"mcq",q:"What role does the guide RNA molecule play in CRISPR?",o:["It cuts the DNA directly","It directs Cas9 protein to a specific DNA sequence","It repairs damaged genes","It prevents off-target edits"],a:"It directs Cas9 protein to a specific DNA sequence"},
{t:"mcq",q:"What Nobel Prize did Doudna and Charpentier receive and when?",o:["Nobel Prize in Medicine 2018","Nobel Prize in Chemistry 2019","Nobel Prize in Chemistry 2020","Nobel Prize in Physiology 2021"],a:"Nobel Prize in Chemistry 2020"},
{t:"short",q:"What is meant by 'off-target edits' in CRISPR?",a:"unintended cuts elsewhere in the genome / unintended genetic changes at other locations"}],ms:50},

{t:"The Economics of Inequality",p:`Economic inequality has reached levels not seen since the Gilded Age in many developed nations. In the United States, the top 1% of earners now hold approximately 38% of the nation's wealth, while the bottom 50% collectively hold just 2%. This concentration has intensified since the 1980s, coinciding with policy shifts including tax cuts, reduced union membership, and financial deregulation.\n\nEconomists debate the consequences of rising inequality. Some argue that inequality is a necessary feature of market economies that provides incentives for entrepreneurship and risk-taking — the prospect of exceptional rewards motivates innovation. Others, including economists like Joseph Stiglitz and Thomas Piketty, contend that excessive inequality undermines economic mobility, reduces consumer demand, corrupts political systems, and ultimately impedes growth.\n\nEmpirical evidence increasingly supports the view that high inequality reduces intergenerational mobility. The "Great Gatsby Curve," identified by economist Miles Corak, demonstrates a robust cross-national correlation: countries with higher income inequality have lower rates of social mobility, meaning children's economic outcomes are more strongly determined by their parents' income. This challenges the notion that inequality is compatible with equal opportunity.`,
qs:[{t:"mcq",q:"What percentage of US national wealth does the top 1% hold?",o:["Approximately 15%","Approximately 25%","Approximately 38%","Approximately 50%"],a:"Approximately 38%"},
{t:"mcq",q:"What is the 'Great Gatsby Curve'?",o:["A theory about wealth creation through innovation","A correlation showing higher inequality countries have lower social mobility","A measure of GDP growth in unequal societies","A description of how wealth redistributes over generations"],a:"A correlation showing higher inequality countries have lower social mobility"},
{t:"mcq",q:"Who identified the Great Gatsby Curve?",o:["Joseph Stiglitz","Thomas Piketty","Miles Corak","John Maynard Keynes"],a:"Miles Corak"},
{t:"mcq",q:"According to the passage, when did inequality intensification begin?",o:["Since the 1960s","Since the 1970s","Since the 1980s","Since the 1990s"],a:"Since the 1980s"},
{t:"short",q:"Name one policy shift mentioned as coinciding with rising inequality.",a:"tax cuts / reduced union membership / financial deregulation"}],ms:50},

{t:"Neuroplasticity: The Changing Brain",p:`For most of the 20th century, neuroscientists believed the adult brain was largely fixed — that its structure and connections were set in early childhood and could not be substantially altered. This view has been overturned by decades of research demonstrating that the brain retains remarkable plasticity throughout life, continuously reorganizing its neural connections in response to experience, learning, and injury.\n\nNeuroplasticity operates at multiple levels. At the synaptic level, connections between neurons are constantly being strengthened or weakened based on their activity patterns, a process described by the maxim "neurons that fire together, wire together." At a larger scale, entire brain regions can expand or contract. London taxi drivers, who must memorize thousands of routes, have been shown through MRI studies to have significantly larger hippocampi — a brain region crucial for spatial navigation — than the general population.\n\nTherapeutic applications are transforming rehabilitation medicine. Stroke patients who have lost motor function can recover abilities through intensive repetitive exercises that gradually recruit neighboring neural circuits to take over functions of damaged areas. Constraint-induced movement therapy, which involves restraining the functioning arm to force use of the impaired one, has shown remarkable outcomes in clinical trials, demonstrating that motivated effort can literally reshape brain architecture.`,
qs:[{t:"mcq",q:"What was the prevailing 20th-century view of the adult brain?",o:["That it was highly adaptable throughout life","That it was largely fixed after early childhood","That it grew continuously until age 40","That it could fully repair itself after any injury"],a:"That it was largely fixed after early childhood"},
{t:"mcq",q:"What does the maxim 'neurons that fire together, wire together' describe?",o:["The formation of new neurons","The process of synaptic connections being strengthened through activity","The role of genetics in brain development","How sleep consolidates memories"],a:"The process of synaptic connections being strengthened through activity"},
{t:"mcq",q:"What did MRI studies of London taxi drivers find?",o:["Their brains were smaller overall","They had significantly larger hippocampi","Their prefrontal cortex was more developed","They had superior visual cortex development"],a:"They had significantly larger hippocampi"},
{t:"mcq",q:"What is constraint-induced movement therapy?",o:["Therapy that restricts all movement","Restraining the functioning arm to force use of the impaired one","Electrical stimulation of damaged brain areas","A form of meditation for stroke recovery"],a:"Restraining the functioning arm to force use of the impaired one"},
{t:"short",q:"What brain region is crucial for spatial navigation?",a:"hippocampus / hippocampi"}],ms:50},

{t:"Dark Matter and the Universe",p:`Approximately 27% of the universe's total energy content consists of dark matter — a mysterious substance that cannot be seen, emitted, or reflected as light, yet can be detected through its gravitational effects on visible matter. Another 68% consists of dark energy, leaving only about 5% as the ordinary matter that comprises stars, planets, and everything we can directly observe.\n\nEvidence for dark matter comes from multiple independent sources. Galaxy rotation curves — the relationship between a star's orbital speed and its distance from the galactic center — do not follow predictions based on visible matter alone. Stars at the outer edges of galaxies rotate as fast as those near the center, implying the presence of an unseen "halo" of mass surrounding each galaxy. Gravitational lensing, where massive objects bend light passing near them, reveals concentrations of mass in locations where no visible matter exists.\n\nDespite decades of effort, the nature of dark matter remains one of physics' greatest unsolved mysteries. Leading candidates include WIMPs (Weakly Interacting Massive Particles) and axions, but no experiment has yet directly detected these particles. The 2006 Bullet Cluster observation, however, provided compelling evidence that dark matter is real and distinct from ordinary matter, when two colliding galaxy clusters showed the separation of visible matter from gravitational mass.`,
qs:[{t:"mcq",q:"What percentage of the universe's energy content does dark matter comprise?",o:["5%","27%","68%","95%"],a:"27%"},
{t:"mcq",q:"What do galaxy rotation curves reveal about dark matter?",o:["That dark matter does not exist","That outer stars rotate slower than inner ones","That an unseen 'halo' of mass surrounds galaxies","That all matter in galaxies is visible"],a:"That an unseen 'halo' of mass surrounds galaxies"},
{t:"mcq",q:"What is gravitational lensing?",o:["The bending of light by massive objects","The emission of light from dark matter","A method of measuring galaxy rotation","The collision of galaxy clusters"],a:"The bending of light by massive objects"},
{t:"mcq",q:"What observation in 2006 provided compelling evidence for dark matter?",o:["The detection of WIMPs","The Bullet Cluster observation","The mapping of galaxy rotation","The discovery of axions"],a:"The Bullet Cluster observation"},
{t:"short",q:"Name one leading candidate particle for dark matter.",a:"WIMPs / axions / Weakly Interacting Massive Particles"}],ms:50}

{t:"Climate Refugees and International Law",p:`The term 'climate refugee' describes people displaced by climate-related events — rising sea levels, prolonged drought, extreme flooding, or the collapse of agricultural systems. The World Bank estimates that without urgent climate action, 216 million internal climate migrants could emerge by 2050 across six world regions, with sub-Saharan Africa generating the most.\n\nUnder the 1951 Refugee Convention, a refugee is defined as someone fleeing persecution based on race, religion, nationality, political opinion, or membership in a particular social group. Climate migrants fall outside this definition, leaving them without formal legal protection or the right to asylum in other countries. Despite growing advocacy, international law has been slow to adapt.\n\nThe island nation of Tuvalu made history in 2023 by signing a treaty with Australia that offers Tuvalu's citizens a pathway to Australian residency as their nation becomes uninhabitable due to sea-level rise. This innovative bilateral agreement has been cited as a model for other at-risk nations, though critics argue that such case-by-case solutions are no substitute for a comprehensive international legal framework.`,

{t:"short",q:"Which world region does the World Bank project will generate the most climate migrants?",a:"sub-Saharan Africa"}],ms:50},

{t:"The Science of Sleep",p:`Sleep is far more biologically active than early researchers assumed. During sleep, the brain cycles through distinct stages: light NREM sleep, deep slow-wave sleep (SWS), and rapid eye movement (REM) sleep, during which most vivid dreaming occurs. A full sleep cycle lasts approximately 90 minutes, and the optimal 7-9 hours of sleep for adults allows for four to five complete cycles.\n\nDeep slow-wave sleep is particularly critical for memory consolidation. During this stage, the hippocampus — which acts as a temporary memory store during waking hours — replays the day's experiences and transfers information to the neocortex for long-term storage. Studies where participants learned new material performed significantly better on recall tests after a full night's sleep compared to those who stayed awake.\n\nChronically inadequate sleep has far-reaching health consequences. Research links regular sleep deprivation (less than 6 hours per night) to a doubled risk of cardiovascular disease, impaired glucose metabolism increasing diabetes risk, suppressed immune function, and accelerated cognitive decline. A 2017 study demonstrated that adults sleeping fewer than six hours per night had a 19% higher caloric intake the following day, linking sleep deprivation directly to obesity risk.`,

{t:"mcq",q:"What function does the hippocampus serve during waking hours?",o:["Long-term memory storage","Temporary memory storage","Motor function control","Dream generation"],a:"Temporary memory storage"},
{t:"mcq",q:"By what percentage did sleep-deprived adults increase their caloric intake the following day?",o:["9%","14%","19%","25%"],a:"19%"},
{t:"short",q:"What happens to memories during deep slow-wave sleep?",a:"hippocampus transfers/replays memories to neocortex for long-term storage / memory consolidation"}],ms:50},

{t:"Quantum Computing Fundamentals",p:`Classical computers process information using bits — binary digits that exist in one of two states: 0 or 1. Quantum computers exploit the principles of quantum mechanics to use quantum bits, or qubits, which can exist in a superposition of both 0 and 1 simultaneously. This allows quantum computers to process enormous numbers of possible solutions in parallel rather than sequentially.\n\nTwo additional quantum phenomena give quantum computers their power. Entanglement allows qubits to be correlated such that measuring one instantly determines the state of another, regardless of physical distance. Interference allows quantum algorithms to amplify correct solutions and cancel incorrect ones. Together, these properties enable certain types of calculations — particularly optimization, cryptography, and simulation of molecular systems — to be performed exponentially faster than classical computers.\n\nPractical quantum computing remains challenging. Qubits are extraordinarily fragile, prone to "decoherence" — losing their quantum properties through interaction with the environment. IBM's most powerful quantum processor has surpassed 1,000 qubits, but most require cooling to temperatures near absolute zero. Experts predict that fault-tolerant quantum computers capable of breaking current encryption standards are likely still a decade or more away.`,

{t:"mcq",q:"What is quantum entanglement?",o:["The tendency of qubits to lose their quantum state","A correlation where measuring one qubit instantly determines another's state","The process of quantum bits overheating","The parallel processing of multiple algorithms"],a:"A correlation where measuring one qubit instantly determines another's state"},
{t:"mcq",q:"What is 'decoherence' in quantum computing?",o:["A method of error correction","Loss of quantum properties through environmental interaction","The cooling process for qubits","An amplification method for solutions"],a:"Loss of quantum properties through environmental interaction"},
{t:"mcq",q:"To what temperature do most quantum computers need to be cooled?",o:["Below freezing","Below -100°C","Near absolute zero","Room temperature"],a:"Near absolute zero"},
{t:"short",q:"Name three types of calculations that quantum computers can perform exponentially faster than classical computers.",a:"optimization / cryptography / simulation of molecular systems"}],ms:50},

{t:"Food Security in a Changing Climate",p:`Global food security faces unprecedented pressure from the intersection of climate change, population growth, and resource degradation. The world population is projected to reach 9.7 billion by 2050, requiring a roughly 50% increase in food production from current levels. At the same time, climate change threatens to reduce crop yields for staples like wheat, rice, and maize in the regions that produce them most abundantly.\n\nA landmark 2021 study in Nature Climate Change found that for every 1°C increase in global average temperature, global wheat yields decline by approximately 6%, rice by 3.2%, and maize by 7.4%. These projections are particularly alarming given that the warmest growing regions — in South Asia and sub-Saharan Africa — are precisely those with the highest rates of food insecurity and the fewest resources to adapt.\n\nAgricultural scientists are pursuing multiple adaptation strategies. Crop breeding programs are developing heat-tolerant, drought-resistant varieties of major staples. Precision agriculture uses satellite data, soil sensors, and AI-driven analytics to optimize water and fertilizer use, increasing yields while reducing environmental impact. Agroforestry — integrating trees into crop systems — can maintain soil quality and microclimate stability. However, experts caution that technological solutions alone are insufficient without substantial policy action to reduce greenhouse gas emissions.`,

{t:"mcq",q:"Which crop shows the highest yield decline per degree of warming?",o:["Wheat","Rice","Maize","Soy"],a:"Maize"},
{t:"mcq",q:"What is agroforestry?",o:["Using AI to optimize crop yields","Integrating trees into crop systems","Large-scale monoculture farming","Hydroponic indoor farming"],a:"Integrating trees into crop systems"},
{t:"short",q:"Which two regions are identified as having the highest food insecurity and fewest adaptive resources?",a:"South Asia and sub-Saharan Africa"}],ms:50},

{t:"The History of Vaccination",p:`Vaccination represents one of medicine's greatest achievements. The practice of inoculation dates to at least the 10th century in China, where practitioners blew dried smallpox scabs into patients' nostrils to induce immunity. The modern era of vaccination began in 1796 when English physician Edward Jenner demonstrated that inoculation with cowpox material protected against smallpox — creating the first scientifically developed vaccine.\n\nLouis Pasteur extended vaccination to other diseases in the 1880s, developing vaccines against chicken cholera, anthrax, and rabies. Pasteur coined the term "vaccine" in honor of Jenner — derived from the Latin "vacca" meaning cow — and established germ theory as the foundation for understanding infectious disease.\n\nThe 20th century saw explosive progress. Vaccines against diphtheria, whooping cough, and tetanus were developed in the 1920s-40s. The Salk polio vaccine, introduced in 1955 following one of history's largest clinical trials involving 1.8 million children, reduced polio cases by 90% within two years. The WHO's global smallpox eradication campaign, using a ring vaccination strategy, declared the disease eradicated in 1980 — the only human disease ever eliminated through vaccination.`,

{t:"mcq",q:"How many children participated in the Salk polio vaccine clinical trial?",o:["180,000","500,000","1.8 million","5 million"],a:"1.8 million"},
{t:"mcq",q:"When did the WHO declare smallpox eradicated?",o:["1960","1970","1980","1990"],a:"1980"},
{t:"short",q:"Who coined the term 'vaccine' and why?",a:"Louis Pasteur / in honor of Jenner / derived from Latin vacca meaning cow"}],ms:50},

{t:"Artificial Intelligence and Art",p:`The emergence of AI image generation tools — including DALL-E, Midjourney, and Stable Diffusion — has ignited fierce debate about creativity, authorship, and the economic future of human artists. These systems, trained on billions of images scraped from the internet including professional artists' work, can produce photorealistic images, paintings in any artist's style, and complex compositions from text prompts in seconds.\n\nThe legal landscape is unsettled. A US Copyright Office ruling in 2023 determined that AI-generated images created without meaningful human creative input cannot receive copyright protection. Meanwhile, class-action lawsuits have been filed against AI companies by artists who argue that training AI on their copyrighted work without consent or compensation constitutes infringement.\n\nProponents argue that AI tools democratize creativity, allowing people without traditional artistic training to realize visual concepts and potentially augmenting professional artists' productivity. Critics counter that this framing obscures a fundamental extraction: AI companies have profited enormously by building on the life's work of millions of artists without acknowledgment or payment. The debate reflects broader tensions around data ownership, consent, and labor displacement that AI presents across many creative and knowledge industries.`,

{t:"The Placebo Effect",p:`The placebo effect — improvements in a patient's condition attributable to belief in treatment rather than the treatment's pharmacological action — has been documented since the modern era of clinical research. What was long dismissed as a mere nuisance confound in drug trials has emerged as a medically significant phenomenon worthy of serious scientific investigation.\n\nResearch reveals that placebos can trigger measurable physiological changes. Placebo analgesics activate the same endogenous opioid pathways that painkillers use, as demonstrated by the fact that naloxone — an opioid blocker — diminishes placebo pain relief. Brain imaging studies show that placebo antidepressants produce neural changes overlapping with those caused by active drugs, particularly in prefrontal and limbic regions associated with emotion regulation.\n\nPerhaps most intriguingly, "open-label" placebo trials — in which participants know they are receiving a placebo — have produced significant improvements in conditions including irritable bowel syndrome, chronic low back pain, and cancer-related fatigue. This finding challenges the assumption that deception is necessary for placebo effects. Researchers propose that the ritual of treatment, patient-provider relationships, and conditioned responses may be as important as belief in generating therapeutic responses.`,

{t:"mcq",q:"What do 'open-label' placebo trials involve?",o:["Double-blind studies with deception","Trials where participants know they are receiving a placebo","Studies comparing two active drugs","Trials conducted in open outdoor settings"],a:"Trials where participants know they are receiving a placebo"},
{t:"mcq",q:"Brain imaging shows placebo antidepressants produce neural changes in which regions?",o:["Motor cortex and cerebellum","Hippocampus and amygdala","Prefrontal and limbic regions","Visual and auditory cortex"],a:"Prefrontal and limbic regions"},
{t:"mcq",q:"What finding from open-label trials challenges a key assumption about placebos?",o:["That placebos work better than real drugs","That deception is NOT necessary for placebo effects","That placebo effects are entirely psychological","That placebos only work for pain"],a:"That deception is NOT necessary for placebo effects"},
{t:"short",q:"Name two conditions improved by open-label placebos in the passage.",a:"irritable bowel syndrome / chronic low back pain / cancer-related fatigue"}],ms:50},

{t:"Nuclear Fusion Energy",p:`Nuclear fusion — the process that powers the sun — has tantalized physicists for decades as a potential source of virtually limitless clean energy. Unlike nuclear fission, which splits heavy atoms and produces long-lived radioactive waste, fusion combines light hydrogen isotopes (deuterium and tritium) to release energy, producing helium as its primary byproduct and only short-lived radioactive waste.\n\nIn December 2022, scientists at the National Ignition Facility (NIF) at Lawrence Livermore National Laboratory achieved a historic milestone: for the first time, a fusion experiment produced more energy from fusion reactions than the laser energy delivered to the target — achieving "ignition." The experiment delivered 2.05 megajoules of laser energy and produced 3.15 megajoules of fusion energy.\n\nHowever, the path to commercial fusion power remains long. The NIF experiment did not account for the total electricity required to power the lasers, which was approximately 300 megajoules — far more than the 3.15 megajoules produced. The international ITER project in southern France, the world's largest experimental fusion reactor, is designed to produce 500 megawatts of fusion power from 50 megawatts of input — but it is not designed to generate electricity for the grid. Private companies including Commonwealth Fusion Systems and TAE Technologies are pursuing alternative approaches, hoping to deliver commercial fusion power within the next two decades.`,

{t:"mcq",q:"When did the NIF achieve fusion ignition?",o:["December 2018","December 2020","December 2022","December 2023"],a:"December 2022"},
{t:"mcq",q:"How much fusion energy did the NIF experiment produce?",o:["2.05 megajoules","3.15 megajoules","300 megajoules","500 megajoules"],a:"3.15 megajoules"},
{t:"mcq",q:"What is the ITER project designed to achieve?",o:["Commercial electricity generation","500 megawatts of fusion from 50 MW input","Fusion ignition for the first time","Replacing all nuclear fission plants"],a:"500 megawatts of fusion from 50 MW input"},
{t:"short",q:"What are the two hydrogen isotopes used in fusion?",a:"deuterium and tritium"}],ms:50},

{t:"Digital Privacy in the Modern Age",p:`In 2023, the average person generates approximately 1.7 megabytes of data every second of every day. This data — from search queries and location tracking to biometric data and behavioral patterns — is harvested by technology companies, advertisers, governments, and data brokers, creating detailed profiles used to influence behavior, target advertising, and increasingly, make consequential decisions about credit, employment, and insurance.\n\nThe legal landscape for digital privacy varies dramatically by region. The European Union's General Data Protection Regulation (GDPR), enacted in 2018, established robust privacy rights including the right to access personal data, the right to erasure ("right to be forgotten"), and requirements for explicit consent before data collection. Since its implementation, the GDPR has levied over €4 billion in fines against major technology companies. The United States lacks a comprehensive federal privacy law, relying instead on a patchwork of sector-specific regulations.\n\nEmerging technologies amplify privacy concerns. Facial recognition systems deployed in public spaces can identify individuals without their knowledge or consent. "Data brokers" compile and sell personal profiles containing thousands of data points on hundreds of millions of people. End-to-end encryption provides strong individual privacy protection but has become a focal point of government-tech company conflicts, with law enforcement agencies arguing that encryption prevents access to evidence in criminal investigations.`,

{t:"short",q:"Why does the US lack comprehensive digital privacy protection?",a:"relies on patchwork of sector-specific regulations / no comprehensive federal privacy law"}],ms:50},

{t:"The Opioid Epidemic in America",p:`The opioid crisis emerged from an intersection of medical practice, pharmaceutical marketing, and regulatory failures. In the 1990s, Purdue Pharma aggressively marketed OxyContin — a powerful prescription opioid — claiming it carried a low risk of addiction. Sales representatives were incentivized to persuade doctors to prescribe it for chronic pain, with company documents later revealing that executives knew about addiction risks they publicly downplayed. By 2010, enough prescription opioids were sold annually to medicate every American adult around the clock for a month.\n\nAs prescription opioids became more tightly controlled in the early 2010s, many people who had become dependent transitioned to heroin, which was cheaper and more available. A subsequent wave involved illicitly manufactured fentanyl — a synthetic opioid approximately 50 to 100 times more potent than morphine — which began appearing in the drug supply and is now the leading driver of overdose deaths.\n\nThe crisis has claimed over 500,000 American lives since 1999 and has demonstrably reduced US life expectancy. Evidence-based treatment approaches including medication-assisted treatment (MAT) using methadone or buprenorphine have proven effective but remain widely undertreated and stigmatized. Litigation against pharmaceutical companies, distributors, and pharmacies has resulted in settlements exceeding $50 billion designated for addiction treatment.`,
