{t:"L2 — Plural Possessive Apostrophes",qs:[
{t:"mcq",q:"The _____ restrooms are on the second floor. (multiple teachers)",o:["teacher's","teachers'","teachers's","teachers"],a:"teachers'",ex:"Plural ending in s: add only apostrophe after s"},
{t:"mcq",q:"Which is the plural possessive of 'child'?",o:["childs'","child's","children's","childrens'"],a:"children's",ex:"Irregular plural (children) not ending in s: add 's"},
{t:"mcq",q:"The _____ meeting was rescheduled. (several companies)",o:["company's","companies'","companies's","companys'"],a:"companies'",ex:"Plural ending in s: add only apostrophe"},
{t:"mcq",q:"The _____ dormitory is across campus. (multiple women)",o:["woman's","womans'","women's","womens'"],a:"women's",ex:"Irregular plural (women): add 's"},
{t:"mcq",q:"All of the _____ projects were displayed. (many students)",o:["student's","students'","students's","students"],a:"students'",ex:"Multiple students' = add apostrophe after s"},
{t:"mcq",q:"The _____ welfare is the organization's priority. (all animals)",o:["animal's","animals'","animals's","animal"],a:"animals'",ex:"Multiple animals: add apostrophe after s"},
{t:"mcq",q:"The _____ union voted to strike. (multiple workers)",o:["worker's","workers'","workers","workers's"],a:"workers'",ex:"Plural possessive: workers + apostrophe"},
{t:"mcq",q:"Which correctly pluralizes and shows possession for 'boss'?",o:["boss's offices","bosses offices","bosses' offices","bossess offices"],a:"bosses' offices",ex:"Plural of boss = bosses; plural possessive = bosses'"},
{t:"mcq",q:"The _____ opinions were divided. (three judges)",o:["judge's","judges'","judge","judges"],a:"judges'",ex:"Multiple judges = judges' (possessive)"},
{t:"mcq",q:"The _____ rights are protected by law. (all citizens)",o:["citizen's","citizens'","citizens","citizens's"],a:"citizens'",ex:"Plural possessive: citizens + apostrophe after s"}]},

// L3 — Contractions vs Possessive Pronouns
{t:"L3 — Contractions vs. Possessive Pronouns",qs:[
{t:"mcq",q:"The cat licked _____ paws after eating.",o:["it's","its","its'","its's"],a:"its",ex:"'its' = belonging to it (possessive); 'it's' = it is"},
{t:"mcq",q:"_____ going to be a long meeting.",o:["Its","Its'","It's","Its's"],a:"It's",ex:"'It's' = it is (contraction)"},
{t:"mcq",q:"_____ decision is it to make?",o:["Who's","Whose","Whos","Whos'"],a:"Whose",ex:"'Whose' = possessive; 'who's' = who is"},
{t:"mcq",q:"Do you know _____ speaking at the event?",o:["whose","who's","whos'","whos"],a:"who's",ex:"'who's' = who is (contraction)"},
{t:"mcq",q:"_____ responsible for cleaning the equipment?",o:["Your","You're","Youre","Yours"],a:"You're",ex:"'You're' = you are (contraction)"},
{t:"mcq",q:"Leave your coat on _____ hook.",o:["you're","your","youre","yours"],a:"your",ex:"'your' = belonging to you (possessive)"},
{t:"mcq",q:"The team celebrated _____ victory.",o:["there","their","they're","theirs'"],a:"their",ex:"'their' = belonging to them (possessive)"},
{t:"mcq",q:"_____ been raining all morning.",o:["Their","There","They're","Theyre"],a:"They're",ex:"'They're' = they are (contraction)"},
{t:"mcq",q:"She put the book over _____.",o:["their","there","they're","theirs"],a:"there",ex:"'there' = place/location"},
{t:"mcq",q:"The victory was _____.",o:["there","their","they're","theirs"],a:"theirs",ex:"'theirs' = belonging to them (possessive pronoun — no apostrophe)"}]},

// L4 — Comma Rules: Coordinating Conjunctions
{t:"L4 — Commas with Coordinating Conjunctions (FANBOYS)",qs:[
{t:"mcq",q:"Which correctly joins two independent clauses?",o:["She studied all night, yet she failed the exam.","She studied all night yet, she failed the exam.","She studied all night yet she failed, the exam.","She studied, all night yet she failed the exam."],a:"She studied all night, yet she failed the exam.",ex:"Comma before coordinating conjunction 'yet' joining two independent clauses"},
{t:"mcq",q:"Identify the correctly punctuated sentence:",o:["I wanted coffee but, the shop was closed.","I wanted coffee, but the shop was closed.","I wanted coffee but the shop, was closed.","I wanted, coffee but the shop was closed."],a:"I wanted coffee, but the shop was closed.",ex:"Comma + 'but' correctly joins two independent clauses"},
{t:"mcq",q:"When should you NOT use a comma before 'and'?",o:["Always use a comma before 'and'","When 'and' joins two independent clauses","When 'and' joins only two words or short phrases","When the sentences are long"],a:"When 'and' joins only two words or short phrases",ex:"No comma needed when 'and' joins only two words: 'She sang and danced'"},
{t:"mcq",q:"Which sentence needs a comma?",o:["She reads and she writes daily.","She reads and writes daily.","Both need commas","Neither needs a comma"],a:"She reads and she writes daily.",ex:"Two independent clauses joined by 'and' need a comma: 'She reads, and she writes'"},
{t:"mcq",q:"Identify the comma error: 'He was tired, so, he went to bed early.'",o:["After 'tired'","After 'so'","Before 'so'","No error"],a:"After 'so'",ex:"No comma after coordinating conjunction 'so'"},
{t:"mcq",q:"Choose the correct sentence:",o:["They can take the bus or, they can walk.","They can take the bus, or they can walk.","They can take the bus or they can, walk.","They can take, the bus or they can walk."],a:"They can take the bus, or they can walk.",ex:"Comma before 'or' when joining two independent clauses"},
{t:"mcq",q:"Which correctly uses 'for' as a conjunction?",o:["She left early, for she had a flight to catch.","She left early for, she had a flight to catch.","She left, early for she had a flight to catch.","She left early for she, had a flight to catch."],a:"She left early, for she had a flight to catch.",ex:"'for' as conjunction = 'because'; comma before it between two clauses"},
{t:"mcq",q:"Identify the error: 'I can help you, nor can my colleague.'",o:["Comma placement","'nor' should be 'neither'","The sentence needs another negative","No error"],a:"'nor' should be 'neither'",ex:"'nor' pairs with 'neither': 'Neither I nor my colleague can help'"},
{t:"mcq",q:"The Oxford comma in 'a, b, and c' is used to:",o:["Replace the conjunction 'and'","Add clarity before the final item in a list","Separate only two items","Always precede 'but'"],a:"Add clarity before the final item in a list",ex:"Oxford comma: optional but clarifying comma before final list item"},
{t:"mcq",q:"Choose correctly: 'She is intelligent _____ she lacks confidence.'",o:["but,","yet,","but","yet"],a:"but",ex:"Use 'but' (no comma if short clauses and no ambiguity), though 'but' with comma is also acceptable"}]},

// L5 — Comma Splices & Run-ons
{t:"L5 — Comma Splices & Run-On Sentences",qs:[
{t:"mcq",q:"Identify the comma splice:",o:["She ran quickly; she missed the bus.","She ran quickly, she missed the bus.","She ran quickly, but she missed the bus.","She ran quickly. She missed the bus."],a:"She ran quickly, she missed the bus.",ex:"Two independent clauses joined only by a comma = comma splice"},
{t:"mcq",q:"Which correctly fixes: 'It was raining we stayed inside'?",o:["It was raining, we stayed inside.","It was raining we stayed, inside.","It was raining; we stayed inside.","It was raining we, stayed inside."],a:"It was raining; we stayed inside.",ex:"Use semicolon, period, or conjunction + comma to join two independent clauses"},
{t:"mcq",q:"Which is a run-on sentence?",o:["He finished his work; he left early.","He finished his work. He left early.","He finished his work and left early.","He finished his work he left early."],a:"He finished his work he left early.",ex:"Two clauses with no punctuation = run-on"},
{t:"mcq",q:"Which best corrects this comma splice: 'The experiment failed, the researchers were disappointed.'?",o:["The experiment failed the researchers were disappointed.","The experiment failed; the researchers were disappointed.","The experiment failed, and, the researchers were disappointed.","The experiment, failed the researchers were disappointed."],a:"The experiment failed; the researchers were disappointed.",ex:"Semicolon correctly joins two related independent clauses"},
{t:"mcq",q:"Which sentence is correct?",o:["I love hiking, my sister prefers swimming.","I love hiking my sister prefers swimming.","I love hiking; my sister prefers swimming.","I love hiking, however my sister prefers swimming."],a:"I love hiking; my sister prefers swimming.",ex:"Semicolon correctly joins two contrasting independent clauses"},
{t:"mcq",q:"'However' joining two independent clauses requires:",o:["Just a comma before it","A period before it OR a semicolon before it with a comma after it","Nothing — no punctuation needed","A comma before and after it always"],a:"A period before it OR a semicolon before it with a comma after it",ex:"She left. However, he stayed. OR She left; however, he stayed."},
{t:"mcq",q:"Identify the error: 'The food was delicious, moreover, the service was excellent.'",o:["Comma after 'delicious'","'moreover' should be 'and'","Should be semicolon after 'delicious': 'delicious; moreover,'","No error"],a:"Should be semicolon after 'delicious': 'delicious; moreover,'",ex:"'moreover' is a conjunctive adverb: needs semicolon before it"},
{t:"mcq",q:"Which option creates a grammatically correct sentence from: 'The meeting ended _____ everyone left quickly.'",o:["The meeting ended, everyone left quickly.","The meeting ended and everyone left quickly.","The meeting ended everyone left quickly.","The meeting ended, and, everyone left quickly."],a:"The meeting ended and everyone left quickly.",ex:"Conjunction 'and' joining short clauses: comma optional"},
{t:"mcq",q:"A fused sentence differs from a comma splice because:",o:["It uses the wrong conjunction","It has no punctuation at all between the clauses","It uses too many commas","It is grammatically correct"],a:"It has no punctuation at all between the clauses",ex:"Fused/run-on: no punctuation; comma splice: only a comma"},
{t:"mcq",q:"Which correctly uses a colon between clauses?",o:["She had one dream: to become a surgeon.","She had: one dream to become a surgeon.","She: had one dream to become a surgeon.","She had one dream to become: a surgeon."],a:"She had one dream: to become a surgeon.",ex:"Colon after complete sentence to introduce explanation or elaboration"}]},

// L6 — Sentence Fragments
{t:"L6 — Sentence Fragments",qs:[
{t:"mcq",q:"Which is a sentence fragment?",o:["She studied every night.","Despite her best efforts.","He passed the exam easily.","The library closes at nine."],a:"Despite her best efforts.",ex:"'Despite her best efforts' is a dependent clause — needs a main clause"},
{t:"mcq",q:"Which fragment type is: 'Running as fast as she could.'?",o:["Subordinate clause fragment","Participial phrase fragment","Noun phrase fragment","Prepositional phrase fragment"],a:"Participial phrase fragment",ex:"A participial phrase (-ing) without a main clause = fragment"},
{t:"mcq",q:"Correct the fragment: 'Because the weather was severe.'",o:["The weather was severe because.","Because the weather was severe, the game was cancelled.","The weather. Was severe.","Because, the weather was severe."],a:"Because the weather was severe, the game was cancelled.",ex:"Attach subordinate clause to a main clause"},
{t:"mcq",q:"Which is complete?",o:["The old man in the gray coat.","Although she disagreed with him.","Standing by the window all afternoon.","The announcement surprised everyone."],a:"The announcement surprised everyone.",ex:"Subject + predicate = complete sentence"},
{t:"mcq",q:"Identify the fragment: 'The most important consideration being the cost.'",o:["Complete sentence","Noun phrase fragment with participial modifier","Correctly uses 'being'","Subject-verb agreement error"],a:"Noun phrase fragment with participial modifier",ex:"'being' here is a participle, not a finite verb — needs fixing: 'The most important consideration IS the cost'"},
{t:"mcq",q:"Which correctly completes the fragment 'Which took several hours'?",o:["The repair, which took several hours.","The repair took which several hours.","The repair, which took several hours, was finally complete.","Which took several hours was the repair."],a:"The repair, which took several hours, was finally complete.",ex:"Relative clause 'which took several hours' must be embedded in main clause"},
{t:"mcq",q:"A fragment can be corrected by:",o:["Adding a period at the end","Adding a subject or predicate or attaching it to an adjacent sentence","Removing all modifiers","Adding more commas"],a:"Adding a subject or predicate or attaching it to an adjacent sentence",ex:"Fragments lack subjects, predicates, or are dependent clauses"},
{t:"mcq",q:"Which is NOT a fragment?",o:["The exhausted students after the long exam.","After the long exam.","The students were exhausted after the long exam.","Exhausted after the long exam."],a:"The students were exhausted after the long exam.",ex:"Has subject (students) + finite verb (were)"},
{t:"mcq",q:"In creative writing, fragments can be used deliberately. They create:",o:["Grammatical errors only","Emphasis, rhythm, or drama — intentionally","Confusion in readers","Run-on sentences"],a:"Emphasis, rhythm, or drama — intentionally",ex:"Intentional fragments are acceptable in creative contexts for stylistic effect"},
{t:"mcq",q:"Correct: 'She applied for many jobs. Hoping for a quick response.'",o:["She applied for many jobs, hoping for a quick response.","She applied for many jobs. She was hoping for a quick response.","Both A and B are correct","She applied for many jobs hoping. For a quick response."],a:"Both A and B are correct",ex:"Attach participial phrase OR rewrite as complete sentence — both fix the fragment"}]},

// L7 — Subject-Verb Agreement
{t:"L7 — Subject-Verb Agreement",qs:[
{t:"mcq",q:"Choose correctly: 'The list of requirements _____ very long.'",o:["are","were","is","have been"],a:"is",ex:"Subject is 'list' (singular), not 'requirements'"},
{t:"mcq",q:"'Neither the CEO nor the directors _____ available.' Choose correctly.",o:["is","are","was","have been"],a:"are",ex:"Neither/nor: verb agrees with nearer subject 'directors' (plural)"},
{t:"mcq",q:"'Everyone in the three departments _____ approved the plan.' Choose correctly.",o:["have","had","has","are"],a:"has",ex:"'Everyone' = singular indefinite pronoun → singular verb"},
{t:"mcq",q:"'The data _____ inconclusive, according to the report.' (formal writing)",o:["is","are","was","have been"],a:"are",ex:"'Data' is technically plural (singular: datum) in formal/scientific writing"},
{t:"mcq",q:"'Either the teacher or the students _____ wrong.' Choose correctly.",o:["is","are","was","were"],a:"are",ex:"Either/or: verb agrees with nearer subject 'students' (plural)"},
{t:"mcq",q:"'The committee _____ reached a decision.' Choose correctly.",o:["have","are","has","were"],a:"has",ex:"'Committee' = collective noun, treated as singular in American English"},
{t:"mcq",q:"'Five dollars _____ too much to pay for that.' Choose correctly.",o:["are","were","is","have been"],a:"is",ex:"Dollar amounts as a unit = singular"},
{t:"mcq",q:"'Politics _____ a divisive topic.' Choose correctly.",o:["are","have been","is","were"],a:"is",ex:"'-ics' subjects like politics, economics = singular verb"},
{t:"mcq",q:"'The number of students _____ increasing.' Choose correctly.",o:["are","were","is","have been"],a:"is",ex:"'The number of' = singular; 'A number of' = plural"},
{t:"mcq",q:"'There _____ several reasons for this decision.' Choose correctly.",o:["is","has been","was","are"],a:"are",ex:"In 'there + verb + subject', verb agrees with actual subject 'reasons' (plural)"}]},

// L8 — Pronoun-Antecedent Agreement
{t:"L8 — Pronoun-Antecedent Agreement",qs:[
{t:"mcq",q:"'Each of the participants submitted _____ form.' Choose correctly.",o:["their","his or her","its","a"],a:"their",ex:"Modern English accepts 'their' as singular gender-neutral pronoun"},
{t:"mcq",q:"Identify the agreement error: 'The company announced they would lay off workers.'",o:["company","announced","they","workers"],a:"they",ex:"'Company' is singular → should be 'it' in formal writing"},
{t:"mcq",q:"'Neither Maria nor her sisters brought _____ umbrella.' Choose correctly.",o:["her","their","its","an"],a:"their",ex:"'Sisters' (plural) is nearer subject → 'their'"},
{t:"mcq",q:"Which sentence has correct pronoun-antecedent agreement?",o:["Everyone must bring their own lunch.","The team celebrated their victory loudly.","Neither student forgot their homework.","All of the above are now accepted"],a:"All of the above are now accepted",ex:"Modern grammar accepts 'their' for singular and plural gender-neutral use"},
{t:"mcq",q:"'Between you and _____, this plan will fail.' (formal English)",o:["I","me","myself","us"],a:"me",ex:"After preposition 'between': use object pronoun 'me', not subject pronoun 'I'"},
{t:"mcq",q:"Which uses 'themselves' correctly?",o:["He did it themselves.","They did it themselves.","She hurt themselves.","Me and my friend helped themselves."],a:"They did it themselves.",ex:"'Themselves' reflects plural subject 'They'"},
{t:"mcq",q:"'The jury reached _____ verdict after three days.' Choose correctly.",o:["their","its","them","a"],a:"its",ex:"'Jury' as singular collective noun = 'its' (or 'their' in British English)"},
{t:"mcq",q:"'Anyone who loses _____ ticket must buy another.' Choose correctly.",o:["their","his","her","all are acceptable"],a:"all are acceptable",ex:"'their', 'his or her', or 'his' are all grammatically defensible options"},
{t:"mcq",q:"Identify the pronoun error: 'The professor told the students to submit your essays.'",o:["professor","told","your","essays"],a:"your",ex:"'your' shifts from 3rd person (students) to 2nd person — should be 'their'"},
{t:"mcq",q:"'Each of the wolves marked _____ territory.' Choose correctly.",o:["their","its","them","it's"],a:"its",ex:"'Each' = singular → 'its' (each wolf = singular animal possessive)"}]},

// L9 — Parallel Structure
{t:"L9 — Parallel Structure",qs:[
{t:"mcq",q:"Choose the sentence with correct parallel structure:",o:["She likes hiking, to swim, and biking.","She likes hiking, swimming, and biking.","She likes to hike, swimming, and bike.","She likes hike, swim, and biking."],a:"She likes hiking, swimming, and biking.",ex:"All three activities in same -ing form = parallel"},
{t:"mcq",q:"Identify the parallelism error:",o:["He was tired, hungry, and irritable.","She can run fast, jump high, and throw far.","They enjoyed singing, to dance, and laughing.","The job requires patience, skill, and dedication."],a:"They enjoyed singing, to dance, and laughing.",ex:"'to dance' breaks parallel -ing pattern; should be 'dancing'"},
{t:"mcq",q:"Choose the parallel version of: 'I prefer reading to watch TV.'",o:["I prefer reading to watching TV.","I prefer to read to watch TV.","I prefer reading to TV watching.","I prefer reading instead of to watch TV."],a:"I prefer reading to watching TV.",ex:"'reading...watching' = parallel -ing forms"},
{t:"mcq",q:"Which is parallel?",o:["The plan is logical, achievable, and has low cost.","The plan is logical, achievable, and inexpensive.","The plan is logical, can be achieved, and is cheap.","The plan has logic, is achievable, and costs little."],a:"The plan is logical, achievable, and inexpensive.",ex:"Three adjectives: logical, achievable, inexpensive = parallel"},
{t:"mcq",q:"Correct the error: 'She was not only talented but also she worked hard.'",o:["She was not only talented but also worked hard.","She was not only talented but also she was hard working.","She was not only talent but also hard work.","No correction needed."],a:"She was not only talented but also worked hard.",ex:"'not only...but also' requires parallel structure"},
{t:"mcq",q:"Which uses correlative conjunctions correctly?",o:["Both she sings and dancing.","Both singing and to dance.","Both she sings and she dances.","Both to sing and dances."],a:"Both she sings and she dances.",ex:"'both...and' requires parallel structure — both clauses must match"},
{t:"mcq",q:"Identify the parallel error in: 'The coach told us to work hard, stay focused, and being positive.'",o:["work hard","stay focused","being positive","No error"],a:"being positive",ex:"Should be 'be positive' to match 'work' and 'stay' (infinitive form)"},
{t:"mcq",q:"Which correction maintains parallelism: 'He likes fishing, hiking, and to camp.'?",o:["He likes fishing, hiking, and camping.","He likes to fish, hiking, and to camp.","He likes fish, hike, and camp.","He likes fishing, hikes, and camping."],a:"He likes fishing, hiking, and camping.",ex:"All three in -ing gerund form = parallel"},
{t:"mcq",q:"Choose the parallel sentence about job requirements:",o:["Applicants must be punctual, organized, and they should communicate well.","Applicants must be punctual, organized, and communicative.","Applicants should be punctual, they need organization, and communicate well.","Applicants must have punctuality, be organized, and good communication."],a:"Applicants must be punctual, organized, and communicative.",ex:"Three adjectives in parallel: punctual, organized, communicative"},
{t:"mcq",q:"Which correctly uses parallel structure with 'either...or'?",o:["Either you study or failing.","Either study or fail.","Either studying or to fail.","Either you study or you are failing."],a:"Either study or fail.",ex:"'either...or' requires matching verb forms: study / fail"}]},

// L10 — Modifier Placement
{t:"L10 — Modifier Placement & Dangling Modifiers",qs:[
{t:"mcq",q:"Identify the dangling modifier: 'Running late, the bus was missed by Sarah.'",o:["Running late","the bus","was missed","by Sarah"],a:"Running late",ex:"'Running late' should modify Sarah, not the bus — rewrite: 'Running late, Sarah missed the bus'"},
{t:"mcq",q:"Which sentence has a misplaced modifier?",o:["She almost earned $500 in tips last night.","She earned almost $500 in tips last night.","She earned $500 in almost tips last night.","Almost she earned $500 in tips last night."],a:"She almost earned $500 in tips last night.",ex:"'almost' is placed before 'earned' but should be near '$500'"},
{t:"mcq",q:"Correct: 'Having eaten dinner, the movie began.'",o:["Having eaten dinner, we started the movie.","The movie having eaten dinner began.","After dinner having been eaten, the movie began.","Having eaten dinner was when the movie began."],a:"Having eaten dinner, we started the movie.",ex:"'Having eaten dinner' must modify 'we' (the eaters), not the movie"},
{t:"mcq",q:"'Only' is correctly placed in which sentence?",o:["I only eat vegetables on Mondays.","I eat only vegetables on Mondays.","Only I eat vegetables on Mondays (if emphasizing the person)","Both B and C can be correct depending on intended meaning"],a:"Both B and C can be correct depending on intended meaning",ex:"Modifier placement changes meaning: 'only vegetables' vs 'only I' vs 'only on Mondays'"},
{t:"mcq",q:"Identify the misplaced modifier: 'He served steak to the guests on silver platters.'",o:["He served steak","to the guests","on silver platters","No error — meaning is clear"],a:"on silver platters",ex:"'on silver platters' modifies 'served', but placement implies guests are on platters"},
{t:"mcq",q:"Correct: 'Battered by years of storms, the historian examined the lighthouse.'",o:["Battered by years of storms, the historian examined the lighthouse.","The historian, battered by years of storms, examined the lighthouse.","The historian examined the lighthouse, which was battered by years of storms.","Both B and C correctly fix the dangling modifier"],a:"Both B and C correctly fix the dangling modifier",ex:"The lighthouse, not the historian, was battered — modifier must be near what it modifies"},
{t:"mcq",q:"Which uses 'barely' correctly?",o:["She barely could hear the music.","She could barely hear the music.","She could hear barely the music.","Barely she could hear the music."],a:"She could barely hear the music.",ex:"'barely' should be placed directly before what it modifies — the verb phrase"},
{t:"mcq",q:"Identify the squinting modifier: 'Students who study often get better grades.'",o:["students","who study","often","grades"],a:"often",ex:"'often' squints — does it modify 'study' or 'get'? Rewrite for clarity"},
{t:"mcq",q:"Which is free of modifier errors?",o:["Painted last year, the buyers admired the house.","The house, painted last year, impressed the buyers.","Having painted last year, the house impressed buyers.","The buyers, painted last year, admired the house."],a:"The house, painted last year, impressed the buyers.",ex:"The modifier 'painted last year' correctly sits next to 'house'"},
{t:"mcq",q:"Correct: 'To succeed in business, hard work is required.'",o:["To succeed in business, hard work is required.","To succeed in business, you need to work hard.","Hard work, to succeed in business, is required.","To succeed in business is requiring hard work."],a:"To succeed in business, you need to work hard.",ex:"Infinitive phrase 'to succeed in business' must have a logical subject — 'you'"}]},

// L11 — Active vs Passive Voice
{t:"L11 — Active & Passive Voice",qs:[
{t:"mcq",q:"Convert to active voice: 'The report was written by the committee.'",o:["The committee was written by the report.","The committee wrote the report.","The report wrote the committee.","Written by the committee was the report."],a:"The committee wrote the report.",ex:"Active: subject performs action; passive: subject receives action"},
{t:"mcq",q:"Which sentence is in passive voice?",o:["The chef prepared the meal carefully.","The jury reached its verdict quickly.","The award was presented by the director.","She completed the project ahead of schedule."],a:"The award was presented by the director.",ex:"Passive: 'was presented' — subject receives the action"},
{t:"mcq",q:"When is passive voice preferred?",o:["Always, as it sounds more formal","When the actor is unknown or less important than the action","When you want shorter sentences","When writing conversation"],a:"When the actor is unknown or less important than the action",ex:"Example: 'The suspect was arrested' (actor less important)"},
{t:"mcq",q:"Convert to passive: 'Scientists discovered a new species.'",o:["A new species was discovered by scientists.","A new species discovered scientists.","Scientists were discovered by a new species.","Discovery of a new species by scientists."],a:"A new species was discovered by scientists.",ex:"Passive: object becomes subject + 'was/were' + past participle + 'by' + agent"},
{t:"mcq",q:"Which is stronger and clearer?",o:["Mistakes were made.","The manager made mistakes.","Mistakes had been made by management.","It was found that mistakes were made."],a:"The manager made mistakes.",ex:"Active voice is usually clearer and assigns responsibility directly"},
{t:"mcq",q:"'The window was broken' is passive. The implied agent might be:",o:["The window","The broken","Someone (unknown)","The action of breaking"],a:"Someone (unknown)",ex:"Passive voice can deliberately obscure or omit the agent"},
{t:"mcq",q:"Identify the passive construction: 'The new policy will be implemented next month.'",o:["The new policy","will be implemented","next month","No passive — this is future tense"],a:"will be implemented",ex:"'will be implemented' = passive future; who implements it is omitted"},
{t:"mcq",q:"Which avoids weak passive voice?",o:["It is believed that the proposal will fail.","Many analysts believe the proposal will fail.","The proposal is believed by analysts to fail.","Failure is predicted for the proposal."],a:"Many analysts believe the proposal will fail.",ex:"Active construction is clearer and more direct"},
{t:"mcq",q:"Scientific writing often uses passive voice to:",o:["Sound more impressive","Emphasize the researchers' importance","Keep the focus on the experiment rather than the researcher","Confuse readers"],a:"Keep the focus on the experiment rather than the researcher",ex:"'The solution was heated' focuses on the experiment, not 'We heated the solution'"},
{t:"mcq",q:"'The decision has been made.' To improve this sentence:",o:["The decision has been made by us.","We have made the decision.","Making the decision has been done.","The made decision exists."],a:"We have made the decision.",ex:"Active voice assigns clear responsibility"}]},

// L12 — Semicolons & Colons
{t:"L12 — Semicolons & Colons",qs:[
{t:"mcq",q:"Which correctly uses a semicolon?",o:["She was tired; but she continued working.","She was tired; she continued working.","She was tired, she; continued working.","She; was tired she continued working."],a:"She was tired; she continued working.",ex:"Semicolon joins two complete, related independent clauses — not used before 'but'"},
{t:"mcq",q:"Which correctly uses a colon?",o:["She needed: eggs, milk, and butter.","She needed three things: eggs, milk, and butter.","She needed three things eggs: milk and butter.","She needed three things eggs, milk: and butter."],a:"She needed three things: eggs, milk, and butter.",ex:"Colon must follow a complete sentence; it introduces a list or explanation"},
{t:"mcq",q:"When can you use a semicolon?",o:["Between a dependent and independent clause","Before a coordinating conjunction like 'but'","Between two complete independent clauses","After an introductory phrase"],a:"Between two complete independent clauses",ex:"Semicolons join two grammatically complete sentences"},
{t:"mcq",q:"Which uses a semicolon correctly in a complex list?",o:["We visited Paris France London England and Rome Italy.","We visited Paris, France, London, England, and Rome, Italy.","We visited Paris, France; London, England; and Rome, Italy.","We visited Paris France; London England; Rome Italy."],a:"We visited Paris, France; London, England; and Rome, Italy.",ex:"Semicolons separate list items that already contain commas"},
{t:"mcq",q:"Identify the error: 'The meeting is at three o'clock: please be on time.'",o:["'three o'clock' should be '3:00'","The colon is incorrectly used here","Should be a semicolon","No error"],a:"The colon is incorrectly used here",ex:"A colon after 'o'clock' is incorrect — 'please be on time' is not a list or explanation that needs a colon"},
{t:"mcq",q:"Which sentence uses punctuation correctly?",o:["Remember this; success requires patience.","Remember this: success requires patience.","Remember this, success requires patience.","Remember this — success — requires patience."],a:"Remember this: success requires patience.",ex:"Colon after complete sentence to introduce a key point"},
{t:"mcq",q:"Which is incorrect?",o:["She had two choices: leave or stay.","The results were clear; the treatment worked.","He brought the following: a pen and paper.","However; she disagreed with the outcome."],a:"However; she disagreed with the outcome.",ex:"'However' with semicolon: needs 'She disagreed; however,' or 'However, she disagreed' — not 'However; she'"},
{t:"mcq",q:"Which correctly introduces a quotation?",o:["Shakespeare wrote, 'To be or not to be.'","Shakespeare wrote: 'To be or not to be.'","Shakespeare wrote; 'To be or not to be.'","Shakespeare wrote 'To be or not to be.'"],a:"Shakespeare wrote, 'To be or not to be.'",ex:"Short quotations introduced with a comma, not a colon (colon used with longer/formal quotations)"},
{t:"mcq",q:"A colon can introduce all EXCEPT:",o:["A list","An explanation","A quotation","A new independent clause with no relation to the first"],a:"A new independent clause with no relation to the first",ex:"Colon is used when the second clause explains or illustrates the first"},
{t:"mcq",q:"Correct: 'There were three finalists; however, only one could win.'",o:["Correct as written","Should be 'There were three finalists, however, only one could win.'","Should be 'There were three finalists: however, only one could win.'","Should remove 'however' entirely"],a:"Correct as written",ex:"'however' as conjunctive adverb: semicolon before, comma after — this is correct"}]},

// L13 — Dashes, Hyphens & Parentheses
{t:"L13 — Dashes, Hyphens & Parentheses",qs:[
{t:"mcq",q:"Which correctly uses an em dash?",o:["She discovered the truth — and it shocked her.","She discovered — the truth and it shocked her.","She discovered the truth — it — shocked her.","She discovered — the — truth and it shocked her."],a:"She discovered the truth — and it shocked her.",ex:"Em dash introduces an emphatic addition or interruption"},
{t:"mcq",q:"A hyphen is used to:",o:["Join two independent clauses","Create compound modifiers before nouns and in some compound words","Introduce lists","Show a long pause"],a:"Create compound modifiers before nouns and in some compound words",ex:"Example: 'well-known author', 'sister-in-law'"},
{t:"mcq",q:"Which correctly hyphenates a compound modifier?",o:["A well known author wrote the book.","A well-known author wrote the book.","A well known-author wrote the book.","A wellknown author wrote the book."],a:"A well-known author wrote the book.",ex:"Compound modifier before a noun: hyphenate ('well-known author')"},
{t:"mcq",q:"'The CEO — who had been with the company for 20 years — resigned.' The dashes here create:",o:["A list","A parenthetical element (non-essential information)","A clause error","A fragment"],a:"A parenthetical element (non-essential information)",ex:"Paired em dashes set off non-essential information, similar to parentheses but with more emphasis"},
{t:"mcq",q:"When is a hyphen NOT needed after 'well'?",o:["Before a noun: 'well-planned event'","After a linking verb: 'The event was well planned'","In compound nouns: 'well-being'","In 'well-known figure'"],a:"After a linking verb: 'The event was well planned'",ex:"Predicative position (after linking verb) doesn't require hyphen"},
{t:"mcq",q:"Which correctly uses parentheses?",o:["She (finally, arrived at the meeting.)","She finally arrived at the meeting (thirty minutes late).","She finally (arrived) at the meeting thirty minutes late.","(She finally arrived) at the meeting thirty minutes late."],a:"She finally arrived at the meeting (thirty minutes late).",ex:"Parentheses enclose supplemental, non-essential information"},
{t:"mcq",q:"'State-of-the-art' is hyphenated because it is:",o:["A proper noun","A compound modifier used before a noun","Always hyphenated regardless of position","A foreign phrase"],a:"A compound modifier used before a noun",ex:"'state-of-the-art equipment' — hyphenated before noun; no hyphens as predicate: 'The equipment is state of the art'"},
{t:"mcq",q:"Which uses an em dash incorrectly?",o:["He had one fear — failure.","She packed everything — clothes, toiletries, and books.","However — she disagreed with the plan.","The answer — surprisingly — was correct."],a:"However — she disagreed with the plan.",ex:"This usage is awkward — 'However,' with comma is correct; em dash before 'however' creates unusual rhythm"},
{t:"mcq",q:"'The twenty-first century' uses a hyphen because:",o:["'century' is a compound word","Numbers twenty-one through ninety-nine are always hyphenated","'twenty' must always be hyphenated","The number is very large"],a:"Numbers twenty-one through ninety-nine are always hyphenated",ex:"Compound numbers 21-99 written as words are always hyphenated"},
{t:"mcq",q:"Parenthetical information enclosed in em dashes differs from commas because:",o:["Em dashes are grammatically required; commas are optional","Em dashes provide more emphasis and visual separation","Em dashes always enclose restrictive clauses","There is no difference"],a:"Em dashes provide more emphasis and visual separation",ex:"Both set off non-essential information, but em dashes are more emphatic and dramatic"}]},

// L14 — Commonly Confused Words
{t:"L14 — Commonly Confused Words",qs:[
{t:"mcq",q:"'The scientist _____ a new method for detecting carbon.' (past tense discovery)",o:["invented","innovated","affected","effected"],a:"invented",ex:"'invented' = created/devised; 'effected' means caused (uncommon usage)"},
{t:"mcq",q:"The committee's decision will _____ everyone in the department.",o:["effect","affect","insure","ensure"],a:"affect",ex:"'affect' = verb meaning to influence; 'effect' = usually a noun (result)"},
{t:"mcq",q:"The new law will _____ the safety of workers on construction sites.",o:["affect","effect","ensure","assure"],a:"ensure",ex:"'ensure' = to make certain; 'assure' = to reassure a person; 'insure' = for insurance"},
{t:"mcq",q:"'The medication had an adverse _____ on her sleep.' Choose correctly.",o:["affect","effect","impact on","effectuation"],a:"effect",ex:"'effect' = noun meaning result/outcome"},
{t:"mcq",q:"'_____ your work before submitting it.' (look over carefully)",o:["Proofread","Proof-read","Altogether","Alright"],a:"Proofread",ex:"'Proofread' = to check for errors; 'alright' is informal for 'all right'"},
{t:"mcq",q:"Choose correctly: 'She has _____ experience in the field.'",o:["less","fewer","little","least"],a:"less",ex:"'less' = for uncountable nouns (experience); 'fewer' = for countable nouns (fewer hours)"},
{t:"mcq",q:"'_____ the new regulations take effect, companies must comply.' (upon the time that)",o:["Sense","Since","When","Once all of the above"],a:"Once all of the above",ex:"Both 'when' and 'once' work here; 'since' implies reason, 'sense' is wrong"},
{t:"mcq",q:"'The two candidates differ _____ their approach to foreign policy.'",o:["on","in","with","between"],a:"in",ex:"'differ in' = vary in terms of; 'differ from' = be unlike; 'differ on' = disagree about"},
{t:"mcq",q:"Which uses 'lie' and 'lay' correctly?",o:["Please lay down for a rest.","Please lie down for a rest.","Please lie the book on the table.","The book lied on the table all day."],a:"Please lie down for a rest.",ex:"'lie' = to recline (intransitive); 'lay' = to place something (transitive, needs object)"},
{t:"mcq",q:"'_____ people attended than expected.' Choose correctly.",o:["Less","Fewer","Much","Amount of"],a:"Fewer",ex:"'fewer' = for countable items (people); 'less' = for uncountable amounts"}]},

// L15 — Sentence Variety & Style
{t:"L15 — Sentence Variety & Clarity",qs:[
{t:"mcq",q:"Which revision best improves clarity: 'She is a person who is known for her kindness.'",o:["She is known for kindness as a person.","She is a known kind person.","She is known for her kindness.","Known for her kindness is she."],a:"She is known for her kindness.",ex:"Remove wordy 'is a person who' — direct version is cleaner"},
{t:"mcq",q:"Which is the most concise version of 'Due to the fact that it was raining, the event was cancelled'?",o:["Due to raining, the event was cancelled.","Because it rained, the event was cancelled.","The event was cancelled due to the fact that it was raining outside.","Because of the rain that was falling, the event was cancelled."],a:"Because it rained, the event was cancelled.",ex:"'because' replaces wordy 'due to the fact that'"},
{t:"mcq",q:"Which sentence avoids redundancy?",o:["She made a final conclusion at the end.","The unexpected surprise shocked everyone.","She reached a conclusion.","The unexpected event shocked everyone unexpectedly."],a:"She reached a conclusion.",ex:"'final conclusion' (conclusions are by nature final), 'unexpected surprise' = redundant"},
{t:"mcq",q:"Which correctly uses varied sentence structure for flow?",o:["He ran. He fell. He got up. He ran again.","Running hard, he fell, but he got up and continued.","He ran and he fell and he got up and he ran again.","He ran he fell he got up he ran again."],a:"Running hard, he fell, but he got up and continued.",ex:"Varied sentence structure with participial phrase + independent clause = better flow"},
{t:"mcq",q:"Identify the wordiest phrase:",o:["at this point in time","now","currently","at present"],a:"at this point in time",ex:"'now' or 'currently' replace the wordy 'at this point in time'"},
{t:"mcq",q:"Which improves: 'The reason why she left was because she was tired.'?",o:["The reason she left was that she was tired.","She left because she was tired.","Both A and B improve the sentence","The reason why was she was tired."],a:"Both A and B improve the sentence",ex:"Eliminate 'the reason why...was because' construction — use 'because' or 'that'"},
{t:"mcq",q:"'Passive voice can sometimes be appropriate.' Which example shows appropriate passive?",o:["Mistakes were made (vague responsibility)","The chef prepared the meal (clear agent)","She ran the marathon (active and specific)","The experiment failed (subject performs action)"],a:"Mistakes were made (vague responsibility)",ex:"Passive is appropriate when the agent is unknown, unimportant, or deliberately omitted"},
{t:"mcq",q:"Which best varies sentence openings in a paragraph?",o:["She spoke. She sat down. She waited.","Speaking confidently, she sat. After a pause, she waited.","She spoke and sat down and waited.","Then she spoke. Then she sat. Then she waited."],a:"Speaking confidently, she sat. After a pause, she waited.",ex:"Varied openings (participial phrase, prepositional phrase) create better prose rhythm"},
{t:"mcq",q:"Which transition is MOST appropriate for introducing a contrasting point?",o:["Furthermore","In addition","Nevertheless","Similarly"],a:"Nevertheless",ex:"'Nevertheless' introduces contrast despite a previous concession"},
{t:"mcq",q:"Which sentence is most appropriately formal for academic writing?",o:["The results were kind of surprising.","The results were pretty shocking.","The results were unexpected.","The results were super surprising."],a:"The results were unexpected.",ex:"Academic writing avoids colloquial intensifiers like 'kind of', 'pretty', 'super'"}]},

// L16 — Verb Tenses
{t:"L16 — Verb Tense Consistency & Usage",qs:[
{t:"mcq",q:"Identify the tense shift error: 'She walked into the room and sees everyone staring at her.'",o:["walked","into","sees","staring"],a:"sees",ex:"Inconsistent tense: 'walked' (past) then 'sees' (present) — should be 'saw'"},
{t:"mcq",q:"'By the time she arrives, we _____ waiting for two hours.' Choose correctly.",o:["will have been","will be","are","have been"],a:"will have been",ex:"Future perfect progressive: action continuing until a future point"},
{t:"mcq",q:"Which correctly uses the past perfect?",o:["She had left before we arrived.","She left before we had arrived.","She has left before we arrive.","She was leaving before we arrived."],a:"She had left before we arrived.",ex:"Past perfect (had left) = earlier past action; simple past (arrived) = later past action"},
{t:"mcq",q:"'If I _____ you, I would apologize.' Choose correctly.",o:["am","was","were","will be"],a:"were",ex:"Subjunctive mood for hypothetical conditions: 'If I were...'"},
{t:"mcq",q:"Which uses the present perfect correctly?",o:["She has lived here since 2018.","She has lived here in 2018.","She lived here since 2018.","She has lived here from 2018."],a:"She has lived here since 2018.",ex:"Present perfect + 'since' = action started in past and continues"},
{t:"mcq",q:"'He _____ the report before the deadline.' (completed before a past point)",o:["has finished","finished","had finished","will have finished"],a:"had finished",ex:"Past perfect shows action completed before another past point"},
{t:"mcq",q:"Which correctly uses the future tense in a conditional sentence?",o:["If it rains tomorrow, we will cancel the picnic.","If it will rain tomorrow, we cancel the picnic.","If it rained tomorrow, we will cancel the picnic.","If it rains tomorrow, we would cancel the picnic."],a:"If it rains tomorrow, we will cancel the picnic.",ex:"Real conditional: If + simple present → will + base verb"},
{t:"mcq",q:"'She _____ piano since she was six years old.' (ongoing since past)",o:["played","plays","has been playing","had played"],a:"has been playing",ex:"Present perfect continuous: action begun in past, continuing now"},
{t:"mcq",q:"Which verb form is correct: 'I wish I _____ more time to study.'",o:["have","had","has","will have"],a:"had",ex:"Subjunctive mood after 'wish': use past tense to express present wish"},
{t:"mcq",q:"'By 2030, scientists _____ a cure for Alzheimer's.' (optimistic prediction)",o:["discover","discovered","will discover","will have discovered"],a:"will have discovered",ex:"Future perfect: action that will be completed by a future point"}]},

// L17 — Word Choice & Vocabulary in Context
{t:"L17 — Word Choice & Vocabulary in Context",qs:[
{t:"mcq",q:"'The politician gave an _____ speech that moved the audience to tears.' Best word?",o:["adequate","mediocre","eloquent","sufficient"],a:"eloquent",ex:"'eloquent' = fluent, well-expressed, persuasive — fits the emotional effect described"},
{t:"mcq",q:"'The new regulation will _____ small businesses.' (impose burdensome requirements)",o:["help","benefit","burden","support"],a:"burden",ex:"Context (burdensome requirements) indicates a negative impact on businesses"},
{t:"mcq",q:"'Her _____ explanation left everyone more confused than before.' Best word?",o:["lucid","clear","coherent","convoluted"],a:"convoluted",ex:"'convoluted' = excessively complex, unnecessarily complicated — matches 'more confused'"},
{t:"mcq",q:"'The scientist remained _____ about the controversial theory, neither supporting nor rejecting it.'",o:["enthusiastic","committed","agnostic","dismissive"],a:"agnostic",ex:"'agnostic' (in general use) = uncommitted, not taking a position"},
{t:"mcq",q:"'Critics called his behavior _____, noting his willingness to say anything to get elected.'",o:["principled","opportunistic","consistent","altruistic"],a:"opportunistic",ex:"'opportunistic' = exploiting circumstances without regard for principles"},
{t:"mcq",q:"'The _____ of the ancient manuscript made it difficult to read without magnification.'",o:["magnitude","enormity","minuteness","volume"],a:"minuteness",ex:"'minuteness' = extreme smallness — matches 'difficult to read without magnification'"},
{t:"mcq",q:"'Her _____ generosity funded schools in three countries.' Best intensifying adjective?",o:["common","ordinary","exceptional","adequate"],a:"exceptional",ex:"'exceptional' = far above average — matches the scale described (three countries)"},
{t:"mcq",q:"'The documentary depicted the _____ conditions in the refugee camps.'",o:["luxurious","pristine","squalid","comfortable"],a:"squalid",ex:"'squalid' = extremely dirty and unpleasant — fits the serious documentary context"},
{t:"mcq",q:"'Despite the evidence, he remained _____ in his original position.'",o:["flexible","open-minded","obdurate","persuadable"],a:"obdurate",ex:"'obdurate' = stubbornly refusing to change — matches 'despite the evidence'"},
{t:"mcq",q:"'The new medical device was _____ — it had never been built or tested before.'",o:["conventional","established","novel","familiar"],a:"novel",ex:"'novel' = new and original, not seen before — fits 'never been built or tested'"}]},

// L18 — Punctuation: Quotation Marks
{t:"L18 — Quotation Marks & Dialogue",qs:[
{t:"mcq",q:"Where does the comma go? She said ___ I'm not ready ___",o:['She said "I\'m not ready."','She said, "I\'m not ready."','She said "I\'m not ready".','She said, "I\'m not ready".'],a:'She said, "I\'m not ready."',ex:"Comma before quotation mark; period inside closing quotation mark (American English)"},
{t:"mcq",q:"Which correctly punctuates a divided quotation?",o:['"I was wrong," he said, "and I apologize."','"I was wrong," he said "and I apologize."','"I was wrong", he said, "and I apologize."','"I was wrong," he said. "and I apologize."'],a:'"I was wrong," he said, "and I apologize."',ex:"When the dialogue tag interrupts one sentence: comma + tag + comma + continue lowercase"},
{t:"mcq",q:"In American English, where do periods and commas go relative to closing quotation marks?",o:["Always outside","Always inside","Inside for periods, outside for commas","Inside for both periods and commas"],a:"Inside for both periods and commas",ex:"American English: periods and commas always go inside closing quotation marks"},
{t:"mcq",q:"Question marks go _____ closing quotation marks when the question is part of the quotation.",o:["outside","inside","either, by convention","after the author attribution only"],a:"inside",ex:"'Did she say, \"Are you ready?\"' — question mark inside because the quote itself is a question"},
{t:"mcq",q:"Which correctly uses quotation marks for titles?",o:["I read Hamlet last semester.","I read \"Hamlet\" last semester.","I read 'Hamlet' last semester.","She watched the movie \"The Crown.\""],a:'I read "Hamlet" last semester.',ex:"Short works (poems, articles, episodes) use quotes; long works (plays, novels, films) use italics. Hamlet is a play → italics, but quotes are sometimes used"},
{t:"mcq",q:"'Scare quotes' are used to:",o:["Emphasize important words","Signal irony or that a word is used loosely or ironically","Introduce formal quotations","Replace apostrophes"],a:"Signal irony or that a word is used loosely or ironically",ex:"Example: The 'experts' at the firm turned out to be wrong."},
{t:"mcq",q:"Which correctly formats a block quotation (50+ words)?",o:["Use quotation marks and indent","Indent and omit quotation marks","Use quotation marks but no indent","Use single quotation marks and indent"],a:"Indent and omit quotation marks",ex:"Block quotations (long quotes) are indented and do NOT use quotation marks"},
{t:"mcq",q:"Single quotation marks are used for:",o:["All American English quotations","Titles of short works","A quotation within a quotation","Irony and scare quotes"],a:"A quotation within a quotation",ex:"She said, 'My teacher told me to \"always proofread.\"' — inner quote uses single marks"},
{t:"mcq",q:"Which correctly punctuates the tag line AFTER a question?",o:['"Are you ready?" she asked.','"Are you ready?", she asked.','"Are you ready?" she asked?','"Are you ready," she asked?'],a:'"Are you ready?" she asked.',ex:"When quote ends with ?, no additional comma — the ? serves both purposes"},
{t:"mcq",q:"When quoting a passage and omitting words, use:",o:["Brackets [ ]","An ellipsis ...","A dash —","Parentheses ( )"],a:"An ellipsis ...",ex:"Ellipsis (...) indicates words have been omitted from a quotation"}]},

// L19 — Transition Words
{t:"L19 — Transition Words & Logical Flow",qs:[
{t:"mcq",q:"'She practiced daily. _____, she won the championship.' Best transition?",o:["However","Similarly","Consequently","In contrast"],a:"Consequently",ex:"'Consequently' = as a result — shows cause-effect between practice and winning"},
{t:"mcq",q:"'The economy grew in the first quarter. _____, unemployment remained high.' Best transition?",o:["Furthermore","Therefore","Nevertheless","Similarly"],a:"Nevertheless",ex:"'Nevertheless' = despite that — shows unexpected contrast"},
{t:"mcq",q:"'First, gather your materials. _____, follow the instructions carefully.' Best transition?",o:["However","Then","Nevertheless","In contrast"],a:"Then",ex:"'Then' indicates sequence — appropriate for step-by-step instructions"},
{t:"mcq",q:"'He is an excellent programmer. _____, he is fluent in four languages.' Best transition?",o:["However","In contrast","Moreover","Otherwise"],a:"Moreover",ex:"'Moreover' = in addition, furthermore — adds supporting information"},
{t:"mcq",q:"'Some argue for stricter gun laws. _____, others believe the Second Amendment prohibits such laws.' Best transition?",o:["Therefore","Similarly","Conversely","Consequently"],a:"Conversely",ex:"'Conversely' = on the other hand — introduces the opposing view"},
{t:"mcq",q:"'The plan was well-designed; _____, its implementation failed.' Best transition?",o:["consequently","furthermore","nonetheless","similarly"],a:"nonetheless",ex:"'Nonetheless' = despite that, even so — contrast between design and implementation"},
{t:"mcq",q:"'_____, let us consider the economic implications of this policy.' Best transition for a new section?",o:["However","Turning now to","Subsequently","As a result"],a:"Turning now to",ex:"'Turning now to' signals a shift to a new topic in formal writing"},
{t:"mcq",q:"Which transition signals an EXAMPLE?",o:["Furthermore","Nevertheless","For instance","Therefore"],a:"For instance",ex:"'For instance' = as an example — introduces illustration of a previous point"},
{t:"mcq",q:"'Her argument was compelling. _____, it convinced even her critics.' The relationship is:",o:["Contrast","Concession","Cause and effect","Comparison"],a:"Cause and effect",ex:"Compelling argument → convinced critics = cause and effect; 'Consequently' or 'Therefore' would work"},
{t:"mcq",q:"'He studied medicine for twelve years. _____, he became a renowned surgeon.' Best transition?",o:["Nevertheless","Although","In contrast","Ultimately"],a:"Ultimately",ex:"'Ultimately' = in the end, as a final result — connects long study to eventual achievement"}]},

// L20 — Advanced Grammar: Subjunctive & Complex Structures
{t:"L20 — Subjunctive Mood & Complex Grammar",qs:[
{t:"mcq",q:"'I recommend that she _____ the application immediately.' Choose correctly.",o:["submits","submitted","submit","will submit"],a:"submit",ex:"Subjunctive after 'recommend that': use base form 'submit' (no -s, no -ed)"},
{t:"mcq",q:"'It is essential that every employee _____ trained.' Choose correctly.",o:["is","be","was","were"],a:"be",ex:"Subjunctive after 'essential that': use 'be' (base form)"},
{t:"mcq",q:"'If I _____ the president, I would reform healthcare.' Choose correctly.",o:["am","was","were","will be"],a:"were",ex:"Hypothetical subjunctive: 'If I were' (not 'was'), regardless of person"},
{t:"mcq",q:"'The judge insisted that the witness _____ the whole truth.' Choose correctly.",o:["tells","told","tell","was telling"],a:"tell",ex:"Subjunctive after verbs of demand/insistence: base form 'tell'"},
{t:"mcq",q:"Which sentence correctly uses the subjunctive?",o:["I wish I was taller.","I wish I were taller.","I wish I am taller.","I wish I will be taller."],a:"I wish I were taller.",ex:"Subjunctive after 'wish': 'I were' (not 'I was')"},
{t:"mcq",q:"'She acts as though she _____ the owner of the company.'",o:["is","was","were","has been"],a:"were",ex:"'as though' in hypothetical context = subjunctive 'were'"},
{t:"mcq",q:"Identify the correct conditional: 'If the bridge _____ inspected, it would not have collapsed.'",o:["was","were","had been","would have been"],a:"had been",ex:"Past conditional (third conditional): If + past perfect → would have + past participle"},
{t:"mcq",q:"'Lest he _____ his composure, she changed the subject.' Choose correctly.",o:["loses","lost","lose","would lose"],a:"lose",ex:"'Lest' = subjunctive mood: use base form 'lose'"},
{t:"mcq",q:"Which is grammatically correct?",o:["He succeeded not only in passing but also in excelling.","He succeeded not only passing but also excelling.","He succeeded not only in passing but also excelled.","He succeeded not only to pass but also in excelling."],a:"He succeeded not only in passing but also in excelling.",ex:"'not only...but also' requires parallel structure: 'in passing...in excelling'"},
{t:"mcq",q:"'If I _____ harder, I would have passed the exam.' Which tense?",o:["studied","had studied","would study","have studied"],a:"had studied",ex:"Third conditional (past hypothetical): If + past perfect → would have + past participle"}]}
];

// Create 30 more unique lang modules with varied questions
const extraLangQuestions = [
[{t:"mcq",q:"Which word should be capitalized?",o:["We visited the national museum.","We visited the National Museum of Art.","we visited the national museum of art.","We visited The national Museum."],a:"We visited the National Museum of Art.",ex:"Proper names of specific institutions are capitalized"},
{t:"mcq",q:"'The president of the United States...' — when is 'president' capitalized?",o:["Always","When used as a title before a name: 'President Biden'","Only at the start of a sentence","Never — titles are never capitalized"],a:"When used as a title before a name: 'President Biden'",ex:"Titles are capitalized when directly preceding a name"},
{t:"mcq",q:"Which requires capitalization?",o:["I took a history class.","I study chemistry and biology.","She majors in English literature.","He plays basketball every saturday."],a:"He plays basketball every saturday.",ex:"Days of the week are proper nouns — 'Saturday' must be capitalized"},
{t:"mcq",q:"'She traveled north for three hours.' Is 'north' capitalized?",o:["Yes — directions are always capitalized","No — cardinal directions as directions (not regions) are lowercase","Yes — it describes a destination","No — only cities and countries are capitalized"],a:"No — cardinal directions as directions (not regions) are lowercase",ex:"'north' as direction = lowercase; 'the North' as a region = capitalized"},
{t:"mcq",q:"Which sentence is correctly capitalized?",o:["The Amazon river flows through Brazil.","The Amazon River flows through Brazil.","the amazon river flows through brazil.","The amazon River flows through Brazil."],a:"The Amazon River flows through Brazil.",ex:"'Amazon River' = proper name; both 'Amazon' and 'River' are capitalized as part of the name"}],

[{t:"mcq",q:"Which number should be written as a word?",o:["There were 1,247 attendees.","She bought 3 apples.","The population reached 8 million.","He is 45 years old."],a:"She bought 3 apples.",ex:"Numbers ten and below are typically written as words in standard prose: 'three apples'"},
{t:"mcq",q:"Which correctly writes a number at the start of a sentence?",o:["15 students were absent.","Fifteen students were absent.","15 Students were absent.","fifteen students were absent."],a:"Fifteen students were absent.",ex:"Never start a sentence with a numeral — spell it out"},
{t:"mcq",q:"When should you use numerals (not words) for numbers?",o:["For numbers 1-9 in all contexts","For numbers above ten in all contexts","For statistics, measurements, and exact figures in formal writing","Never in formal writing"],a:"For statistics, measurements, and exact figures in formal writing",ex:"The experiment required 42 participants; temperature rose 3.7 degrees"},
{t:"mcq",q:"Which correctly writes the year?",o:["She was born in nineteen eighty-four.","She was born in 1984.","She was born in the year of 1984.","She was born in '84."],a:"She was born in 1984.",ex:"Years are always written in numerals"},
{t:"mcq",q:"'The report is due on March fifteenth.' How should 'fifteenth' be written?",o:["Fifteenth","fifteenth","15th","the 15th"],a:"March 15th",ex:"Ordinals in dates are written as numerals with suffix: 15th, 3rd, etc."}],

function doLogin(){
  var un=(document.getElementById('lu').value||'').trim();
  var pw=document.getElementById('lp').value||'';
  if(!un||!pw){showLogin('⚠️ Enter both username and password.');return;}
  if(un.toLowerCase()==='dreamcatcher'){
    if(pw===MASTER.password){loginOk({username:MASTER.username,name:MASTER.name,email:MASTER.email,role:'admin'});}
    else{showLogin('❌ Incorrect password.');}
    return;
  }
  var u=findUser(un);
  if(!u){showLogin('❌ Username "'+un+'" not found. Please register.');return;}
  if(!u.verified){showLogin('❌ Please verify your email first.');return;}
  if(u.password!==btoa(pw)){showLogin('❌ Incorrect password.');return;}
  loginOk(u);
}

function doReg(){
  var n=(document.getElementById('rn').value||'').trim();
  var e=(document.getElementById('re').value||'').trim();
  var u=(document.getElementById('ru').value||'').trim().toLowerCase();
  var p=document.getElementById('rp').value||'';
  var p2=document.getElementById('rp2').value||'';
  var pf={n:n,e:e,u:u};
  if(!n||!e||!u||!p){showReg('⚠️ All fields required.',pf);return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)){showReg('⚠️ Invalid email address.',pf);return;}
  if(u==='dreamcatcher'){showReg('⚠️ That username is reserved.',pf);return;}
  if(u.length<3||/\s/.test(u)){showReg('⚠️ Username: 3+ chars, no spaces.',pf);return;}
  if(p.length<6){showReg('⚠️ Password must be at least 6 characters.',pf);return;}
  if(p!==p2){showReg('⚠️ Passwords do not match.',pf);return;}
  if(findUser(u)){showReg('⚠️ Username "'+u+'" already taken.',pf);return;}
  showVerify({name:n,email:e,username:u,password:btoa(p),verified:false,joined:new Date().toISOString()});
}

function rwPanel(i){
  var ex=RW[i];if(!ex)return '';
  var L=['A','B','C','D'];
  var qh=ex.qs.map(function(q,qi){
    if(q.t==='mcq'){
      var opts=q.o.map(function(o,oi){
        return '<div class="opt" data-v="'+o.replace(/"/g,'&quot;')+'" onclick="selOpt(\'rw\','+i+','+qi+',this)"><span class="oltr">'+L[oi]+'</span>'+o+'</div>';
      }).join('');
      return '<div class="qblk"><div class="qlbl"><span class="qnum" style="background:#4f8ef7;color:#fff">'+(qi+1)+'</span>'+q.q+'</div><div class="opts">'+opts+'</div></div>';
    }
    return '<div class="qblk"><div class="qlbl"><span class="qnum" style="background:#4f8ef7;color:#fff">'+(qi+1)+'</span>'+q.q+'</div><input class="tinp" id="sa_rw_'+i+'_'+qi+'" type="text" placeholder="Your answer…"/></div>';
  }).join('');

  return '<div class="epanel"><div class="eptop"><h3>Module '+(i+1)+' — '+ex.t+'</h3><span class="etag etag-rw">Reading & Writing</span></div>'+
    '<div class="psg" style="--ac:#4f8ef7">'+ex.p.split('\n').map(function(p){return '<p>'+p+'</p>';}).join('')+'</div>'+
    qh+'<div class="brow"><button class="btn btn-g" onclick="checkRW('+i+')">Submit & Score ✓</button><button class="btn btn-gh" onclick="openMod(\'rw\','+i+')">Reset</button></div>'+
    '<div id="res_rw_'+i+'"></div></div>';
}

function selOpt(k,mi,qi,el){
  selMap[k+'_'+mi+'_'+qi]=el.getAttribute('data-v');
  var opts=el.closest('.opts');if(opts)opts.querySelectorAll('.opt').forEach(function(o){o.classList.remove('sel');});
  el.classList.add('sel');
}

function checkRW(i){
  var ex=RW[i];var correct=0;
  ex.qs.forEach(function(q,qi){
    var sel=selMap['rw_'+i+'_'+qi]||'';
    var inp=document.getElementById('sa_rw_'+i+'_'+qi);
    var uv=(sel||(inp?inp.value:'')).toLowerCase().trim();
    var av=(q.a||'').toLowerCase();
    var ok=uv===av||av.split('/').map(function(a){return a.trim();}).some(function(a){return uv.indexOf(a)>=0||a.indexOf(uv)>=0;});
    var qblks=document.querySelectorAll('#mpanel .qblk');
    if(qblks[qi]){
      qblks[qi].querySelectorAll('.opt').forEach(function(o){
        if(o.getAttribute('data-v')===q.a)o.classList.add('correct');
        else if(o.classList.contains('sel'))o.classList.add('wrong');
      });
    }
    if(inp){inp.classList.add(ok?'ok':'no');if(!ok)inp.setAttribute('placeholder','Expected: '+q.a);}
    if(ok)correct++;
  });
  var pts=Math.round(correct/ex.qs.length*ex.ms);
  showRes('res_rw_'+i,correct,ex.qs.length,pts,ex.ms,'rw');
  recordScore('rw',i,pts);
}

  return '<div class="epanel"><div class="eptop"><h3>Module '+(i+1)+' — '+ex.t+'</h3><span class="etag etag-m">Math</span></div>'+

// ══════════════════════════════════════
// WRITING PANEL
// ══════════════════════════════════════
function writePanel(i){
  var ex=WRITE[i];if(!ex)return '';
  var tips=ex.tips.map(function(t){return '<div class="wtip">💡 '+t+'</div>';}).join('');
  return '<div class="epanel"><div class="eptop"><h3>Module '+(i+1)+' — '+ex.t+'</h3><span class="etag etag-w">Essay</span></div>'+
    '<div class="wprompt">✍️ <strong>Prompt:</strong> '+ex.prompt+'</div>'+
    '<div style="margin-bottom:12px">'+tips+'</div>'+
    '<div style="font-size:.68rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:6px">Your Essay — minimum '+ex.minW+' words</div>'+
    '<textarea class="wta" id="wt_'+i+'" rows="10" placeholder="Write your essay here. Take a clear position and support with specific examples..." oninput="updWC(this,'+ex.minW+',\'wc_'+i+'\')"></textarea>'+
    '<div class="wcnt" id="wc_'+i+'">0 / '+ex.minW+' words minimum</div>'+
    '<div class="brow"><button class="btn btn-g" onclick="scoreWrite('+i+')">📊 Score My Essay</button>'+
    '<button class="btn btn-gh" onclick="document.getElementById(\'wt_'+i+'\').value=\'\';document.getElementById(\'wc_'+i+'\').textContent=\'0 / '+ex.minW+' words minimum\'">Clear</button></div>'+
    '<div id="res_writing_'+i+'"></div></div>';
}

function updWC(el,min,id){
  var w=el.value.trim()?el.value.trim().split(/\s+/).length:0;
  var d=document.getElementById(id);
  if(d){d.textContent=w+' / '+min+' words minimum';d.style.color=w>=min?'var(--green)':'var(--red)';}
}

function scoreWrite(i){
  var ex=WRITE[i];
  var txt=(document.getElementById('wt_'+i).value||'').trim();
  if(!txt||txt.split(/\s+/).length<30){alert('Please write at least 30 words before scoring.');return;}
  var w=txt.split(/\s+/).length;
  var hasLink=/however|furthermore|moreover|although|therefore|consequently|in addition|nevertheless|additionally/i.test(txt);
  var hasEg=/for example|for instance|such as|notably|to illustrate|specifically/i.test(txt);
  var hasOpin=/i believe|i think|in my opinion|i would argue|i contend|it is clear/i.test(txt);
  var hasCon=/in conclusion|to conclude|in summary|overall|to sum up|ultimately/i.test(txt);
  var sents=txt.split(/[.!?]+/).filter(function(s){return s.trim().length>8;}).length;
  var r=6,an=6,wr=6;
  if(w>=ex.minW)r=7;if(w>=ex.minW+100)r=8;if(w<ex.minW)r=4;
  if(hasEg)an=7;if(hasOpin&&hasEg)an=8;
  if(hasLink)wr=7;if(hasLink&&hasCon)wr=8;if(sents>8)wr=Math.min(wr+0.5,8);
  var avg=Math.round(((r+an+wr)/3)*10)/10;
  var pts=Math.round((avg/8)*ex.ms);
  var cls=avg>=7?'good':avg>=5?'mid':'low';
  document.getElementById('res_writing_'+i).innerHTML=
    '<div class="rbox '+cls+'"><div class="rdisplay">'+
    '<div><div class="rscore" style="color:var(--gold)">'+pts+'/'+ex.ms+'</div><div style="font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-top:3px">Points</div></div>'+
    '<div style="font-size:.82rem;color:var(--text2);line-height:1.6">Score: '+avg+'/8 average</div></div>'+
    (w<ex.minW?'<div style="padding:7px 11px;border-radius:6px;background:rgba(239,68,68,.08);border-left:3px solid var(--red);font-size:.78rem;margin-bottom:6px">⚠️ Below word count: '+w+'/'+ex.minW+'</div>':'')+
    '<table class="stbl"><thead><tr><th>Criterion</th><th>/8</th><th>Feedback</th></tr></thead><tbody>'+
    '<tr><td><strong>Reading</strong></td><td>'+r+'</td><td>'+(w>=ex.minW?'Good length.':'Write more.')+(hasEg?' Evidence cited.':'')+'</td></tr>'+
    '<tr><td><strong>Analysis</strong></td><td>'+an+'</td><td>'+(hasEg?'Examples used.':'Add specific examples.')+(hasOpin?' Clear position.':' State your position.')+'</td></tr>'+
    '<tr><td><strong>Writing</strong></td><td>'+wr+'</td><td>'+(hasLink?'Good transitions.':'Use: furthermore, however, therefore...')+(hasCon?' Strong conclusion.':' Add a conclusion.')+'</td></tr>'+
    '</tbody></table></div>';
  recordScore('writing',i,pts);
}

// ══════════════════════════════════════
// LANGUAGE PANEL
// ══════════════════════════════════════
function langPanel(i){
  var ex=LANG[i];if(!ex)return '';
  var L=['A','B','C','D'];
  var qh=ex.qs.map(function(q,qi){
    var opts=q.o.map(function(o,oi){
      return '<div class="opt" data-v="'+o.replace(/"/g,'&quot;')+'" onclick="selOpt(\'lang\','+i+','+qi+',this)"><span class="oltr">'+L[oi]+'</span>'+o+'</div>';
    }).join('');
    return '<div class="qblk"><div class="qlbl"><span class="qnum" style="background:#22c55e;color:#000">'+(qi+1)+'</span>'+q.q+'</div><div class="opts">'+opts+'</div></div>';
  }).join('');

  return '<div class="epanel"><div class="eptop"><h3>Module '+(i+1)+' — '+ex.t+'</h3><span class="etag etag-l">Language</span></div>'+
    qh+'<div class="brow"><button class="btn btn-g" onclick="checkLang('+i+')">Submit & Score ✓</button><button class="btn btn-gh" onclick="openMod(\'lang\','+i+')">Reset</button></div>'+
    '<div id="res_lang_'+i+'"></div></div>';
}

function checkLang(i){
  var ex=LANG[i];var correct=0;
  ex.qs.forEach(function(q,qi){
    var sel=selMap['lang_'+i+'_'+qi]||'';
    var ok=sel===q.a;
    var qblks=document.querySelectorAll('#mpanel .qblk');
    if(qblks[qi]){
      qblks[qi].querySelectorAll('.opt').forEach(function(o){
        if(o.getAttribute('data-v')===q.a)o.classList.add('correct');
        else if(o.classList.contains('sel'))o.classList.add('wrong');
      });
      if(q.ex&&!qblks[qi].querySelector('.explain')){
        var d=document.createElement('div');d.className='explain';d.textContent='📌 '+q.ex;qblks[qi].appendChild(d);
      }
    }
    if(ok)correct++;
  });
  var pts=Math.round(correct/ex.qs.length*ex.ms);
  showRes('res_lang_'+i,correct,ex.qs.length,pts,ex.ms,'lang');
  recordScore('lang',i,pts);
}

// ══════════════════════════════════════
// RESULT BOX
// ══════════════════════════════════════
function showRes(id,correct,total,pts,ms,k){
  var pct=Math.round(correct/total*100);
  var cls=pct>=80?'good':pct>=60?'mid':'low';
  var cols={rw:'#4f8ef7',math:'#f97316',writing:'#a855f7',lang:'#22c55e'};
  var msg=pct>=90?'🎉 Outstanding!':pct>=75?'⭐ Great work!':pct>=60?'👍 Good effort!':pct>=40?'📚 Keep practicing!':'💪 Review and retry!';
  var el=document.getElementById(id);
  if(el)el.innerHTML='<div class="rbox '+cls+'"><div class="rdisplay">'+
    '<div><div class="rscore" style="color:'+cols[k]+'">'+correct+'/'+total+'</div><div style="font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-top:3px">Correct</div></div>'+
    '<div><div class="rscore" style="color:var(--gold)">'+pts+'</div><div style="font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-top:3px">Pts / '+ms+'</div></div>'+
    '<div style="font-size:.84rem;color:var(--text2);line-height:1.7"><strong style="font-size:1.1rem;color:'+(pct>=80?'var(--green)':pct>=60?'var(--gold)':'var(--red)')+'">'+pct+'%</strong><br/>'+msg+'</div>'+
    '</div></div>';
}

// ══════════════════════════════════════
// RECORD SCORE
// ══════════════════════════════════════
function recordScore(k,i,pts){
  ensureST();
  if(ST[k].done.indexOf(i)<0)ST[k].done.push(i);
  ST[k].scores[i]=pts;
  saveState();updateBadges();
}

// ══════════════════════════════════════
// PROGRESS PAGE
// ══════════════════════════════════════
function renderProgress(){
  ensureST();
  var sections=[
    {k:'rw',name:'Reading & Writing',col:'#4f8ef7',data:RW},
    {k:'math',name:'Math',col:'#f97316',data:MATH},
    {k:'writing',name:'Essay Writing',col:'#a855f7',data:WRITE},
    {k:'lang',name:'Language & Grammar',col:'#22c55e',data:LANG}
  ];
  var gt=grandTotal(),gd=grandDone();
  var gm=sections.reduce(function(a,s){return a+secMaxDone(s.k,s.data);},0)||1;
  var pct=Math.round(gt/gm*100)||0;

  var secBlocks=sections.map(function(s){
    var done=ST[s.k].done,scores=ST[s.k].scores||{};
    var tot=secTotal(s.k);
    var avg=done.length?Math.round(tot/done.length):0;
    var best=done.length?Math.max.apply(null,done.map(function(i){return scores[i]||0;})):0;
    var p=Math.round(done.length/50*100);

    var scoreGrid='';
    for(var i=0;i<50;i++){
      var isDone=done.indexOf(i)>=0;
      var sc=scores[i];
      var ms=s.data[i]?s.data[i].ms:50;
      scoreGrid+='<div class="pgitem'+(isDone?' pgd':'')+'"><div class="pgnum">'+(i+1)+'</div>'+(isDone?'<div class="pgscore">'+sc+'/'+ms+'</div>':'<div class="pgmax">—</div>')+'</div>';
    }

    return '<div class="psec">'+
      '<div class="prow"><div><h3 style="color:'+s.col+'">'+s.name+'</h3><p style="font-size:.76rem;color:var(--text2);margin-top:2px">'+done.length+'/50 modules completed</p></div>'+
      '<div style="display:flex;gap:10px;flex-wrap:wrap">'+
      '<div class="sbox"><div class="sbig" style="color:'+s.col+'">'+tot+'</div><div class="slbl">Total Score</div></div>'+
      '<div class="sbox"><div class="sbig" style="color:var(--text2)">'+avg+'</div><div class="slbl">Avg/Module</div></div>'+
      '<div class="sbox"><div class="sbig" style="color:var(--gold)">'+best+'</div><div class="slbl">Best Score</div></div></div></div>'+
      '<div class="ptrack"><div class="pfill" style="width:'+p+'%;background:'+s.col+'"></div></div>'+
      '<div style="font-size:.67rem;color:var(--text3);margin-bottom:10px">Each box: module number / your score / max score</div>'+
      '<div class="pgrid">'+scoreGrid+'</div></div>';
  }).join('');

  var statsCols=sections.map(function(s){
    return '<div class="gst"><div class="gst-n" style="color:'+s.col+'">'+secTotal(s.k)+'</div><div class="gst-l">'+s.name.split(' ')[0]+'</div></div>';
  }).join('');

  document.getElementById('mc').innerHTML=
    '<div class="shdr"><div><h2>📊 My Progress & Scores</h2><p>Every module score — green boxes = completed</p></div></div>'+
    '<div class="gbar" style="margin-bottom:20px">'+
    '<div><div class="gscore">'+gt+'</div><div class="glbl">Grand Total</div></div>'+
    '<div class="gpbar"><div style="display:flex;justify-content:space-between;font-size:.7rem;color:var(--text2);margin-bottom:2px"><span>Overall Performance</span><span style="color:var(--gold);font-weight:700">'+pct+'% of max earned</span></div>'+
    '<div class="gpbar-track"><div class="gpbar-fill" style="width:'+pct+'%"></div></div>'+
    '<div style="font-size:.64rem;color:var(--text3)">'+gd+' / 200 modules completed</div></div>'+
    '<div class="gstats">'+statsCols+'</div></div>'+
    secBlocks;
}
