<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SAT MASTER PREP</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080c16;--surface:#0f1623;--surface2:#161f30;--surface3:#1d2740;
  --border:#1e3050;--border2:#2a4268;
  --gold:#f5c842;--gold2:#d4a800;--golddim:rgba(245,200,66,.12);
  --blue:#4f8ef7;--red:#ef4444;--green:#22c55e;--purple:#a855f7;--orange:#f97316;
  --text:#eef2ff;--text2:#8fa3c0;--text3:#4a6080;
  --rw:#4f8ef7;--math:#f97316;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.hidden{display:none!important;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* ══ AUTH ══ */
#authWrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:var(--bg);
  background-image:radial-gradient(ellipse 60% 50% at 15% 50%,rgba(245,200,66,.06) 0,transparent 100%),
                   radial-gradient(ellipse 50% 60% at 85% 20%,rgba(79,142,247,.06) 0,transparent 100%);}
.acard{background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:40px 34px;width:100%;max-width:430px;box-shadow:0 40px 80px rgba(0,0,0,.7);
  animation:up .4s ease both;}
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.abrand{text-align:center;margin-bottom:26px;}
.abrand .alogo{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:900;color:var(--gold);}
.abrand .alogo em{font-style:normal;font-family:'Plus Jakarta Sans',sans-serif;font-weight:300;font-size:1rem;color:var(--text2);letter-spacing:3px;margin-left:4px;}
.abrand p{color:var(--text3);font-size:0.8rem;margin-top:5px;}
.amsg{padding:10px 14px;border-radius:10px;font-size:0.81rem;margin-bottom:14px;text-align:center;line-height:1.5;}
.amsg.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5;}
.amsg.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#86efac;}
.fld{margin-bottom:14px;}
.fld label{display:block;font-size:0.7rem;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.fld .iw{position:relative;}
.fld input{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.88rem;transition:.14s;}
.fld input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,200,66,.1);}
.eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:.85rem;opacity:.5;}
.eye:hover{opacity:1;}
.abtn{width:100%;padding:12px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;
  border:none;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.87rem;font-weight:700;
  cursor:pointer;transition:.16s;margin-top:6px;}
.abtn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(245,200,66,.28);}
.abtn2{width:100%;padding:11px;background:transparent;color:var(--text2);border:1px solid var(--border);
  border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.84rem;font-weight:500;cursor:pointer;transition:.16s;}
.abtn2:hover{border-color:var(--gold);color:var(--gold);}
.adiv{text-align:center;color:var(--text3);font-size:.72rem;margin:14px 0 10px;position:relative;}
.adiv::before,.adiv::after{content:'';position:absolute;top:50%;width:38%;height:1px;background:var(--border);}
.adiv::before{left:0}.adiv::after{right:0}
.flink{text-align:center;margin-top:8px;}
.flink button{background:none;border:none;color:var(--text3);font-size:.74rem;cursor:pointer;font-family:inherit;text-decoration:underline;}
.flink button:hover{color:var(--gold);}
.otpbox{font-family:'Playfair Display',serif;font-size:2.5rem;font-weight:700;color:var(--gold);
  letter-spacing:10px;text-align:center;background:var(--surface2);border:1px solid var(--border2);
  border-radius:12px;padding:18px;margin-bottom:6px;}
.otpnote{font-size:.7rem;color:var(--text3);text-align:center;margin-bottom:14px;}

/* ══ APP SHELL ══ */
#app{display:flex;flex-direction:column;min-height:100vh;}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);height:60px;
  display:flex;align-items:center;justify-content:space-between;padding:0 26px;
  position:sticky;top:0;z-index:300;}
.hlogo{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--gold);cursor:pointer;}
.hlogo em{font-style:normal;font-family:'Plus Jakarta Sans',sans-serif;font-weight:300;font-size:.85rem;color:var(--text2);letter-spacing:2px;margin-left:4px;}
.uchip{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:30px;padding:5px 12px 5px 6px;}
.uavt{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));
  display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:#000;}
.uname{font-size:.78rem;font-weight:600;}
.urole{font-size:.56rem;background:var(--gold);color:#000;padding:1px 6px;border-radius:8px;font-weight:700;}
.sout{background:none;border:1px solid var(--border);color:var(--text3);padding:3px 9px;
  border-radius:6px;cursor:pointer;font-size:.68rem;font-family:inherit;transition:.13s;}
.sout:hover{border-color:var(--red);color:var(--red);}

/* NAV */
.nav{background:var(--surface);border-bottom:1px solid var(--border);display:flex;padding:0 16px;overflow-x:auto;}
.nav::-webkit-scrollbar{height:2px;}
.ntab{padding:13px 18px;color:var(--text3);font-size:.73rem;font-weight:700;letter-spacing:.8px;
  text-transform:uppercase;cursor:pointer;border:none;background:none;
  border-bottom:2px solid transparent;transition:.15s;white-space:nowrap;font-family:inherit;
  display:flex;align-items:center;gap:6px;}
.ntab:hover{color:var(--text);}
.ntab.act{color:var(--gold);border-bottom-color:var(--gold);}
.nbdg{font-size:.57rem;padding:2px 7px;border-radius:10px;font-weight:700;background:var(--gold);color:#000;}

/* MAIN */
#mc{flex:1;max-width:1080px;margin:0 auto;width:100%;padding:26px 18px;}

/* ══ DASHBOARD ══ */
.dhero{text-align:center;padding:28px 0 18px;animation:up .5s ease both;}
.dhero h1{font-family:'Playfair Display',serif;font-size:2.6rem;font-weight:900;line-height:1.1;}
.dhero h1 span{color:var(--gold);}
.dhero p{color:var(--text2);margin-top:8px;font-size:.88rem;max-width:460px;margin-inline:auto;line-height:1.7;}

/* PROFILE CARD */
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:18px 22px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:18px;}
.pavt{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));
  display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;
  font-size:1.4rem;font-weight:700;color:#000;flex-shrink:0;}
.pinfo{flex:1;min-width:160px;}
.pname{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;}
.pmeta{font-size:.74rem;color:var(--text2);margin-top:2px;}
.pbadges{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.pb{font-size:.6rem;padding:3px 9px;border-radius:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
.pb-gold{background:rgba(245,200,66,.15);color:var(--gold);border:1px solid rgba(245,200,66,.3);}
.pb-blue{background:rgba(79,142,247,.15);color:var(--blue);border:1px solid rgba(79,142,247,.3);}
.pb-green{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);}
.pright{text-align:right;}
.pright .big{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--gold);}
.pright .lbl{font-size:.64rem;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;}

/* GRAND SCORE */
.gbar{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:20px 24px;margin-bottom:18px;display:flex;gap:22px;align-items:center;flex-wrap:wrap;}
.gscore{font-family:'Playfair Display',serif;font-size:2.6rem;font-weight:700;color:var(--gold);line-height:1;}
.glbl{font-size:.64rem;color:var(--text3);text-transform:uppercase;letter-spacing:.9px;margin-top:3px;}
.gpbar{flex:1;min-width:180px;}
.gpbar-track{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin:6px 0;}
.gpbar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold2),var(--gold));transition:width .9s ease;}
.gstats{display:flex;gap:18px;flex-wrap:wrap;}
.gst{text-align:center;}
.gst-n{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700;}
.gst-l{font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;}

/* SECTION CARDS */
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;margin:18px 0;}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:22px 18px;cursor:pointer;transition:.2s;position:relative;overflow:hidden;animation:up .5s ease both;}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--ac);}
.scard:hover{transform:translateY(-4px);border-color:var(--ac);box-shadow:0 14px 40px rgba(0,0,0,.5);}
.scard .si{font-size:1.7rem;margin-bottom:10px;}
.scard h3{font-family:'Playfair Display',serif;font-size:1.18rem;font-weight:700;margin-bottom:4px;}
.scard p{font-size:.77rem;color:var(--text2);line-height:1.55;margin-bottom:14px;}
.sprog{display:flex;justify-content:space-between;align-items:flex-end;}
.spn{font-family:'Playfair Display',serif;font-size:1.45rem;font-weight:700;}
.spl{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;}
.sbar{height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden;}
.sbar-fill{height:100%;border-radius:2px;transition:width .6s ease;}

/* ══ SECTION VIEW ══ */
.shdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.shdr h2{font-family:'Playfair Display',serif;font-size:1.65rem;font-weight:700;}
.shdr p{color:var(--text2);font-size:.78rem;margin-top:3px;}
.sbox{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 15px;text-align:center;min-width:100px;}
.sbig{font-family:'Playfair Display',serif;font-size:1.45rem;font-weight:700;color:var(--gold);}
.slbl{font-size:.6rem;color:var(--text3);letter-spacing:1px;text-transform:uppercase;}

/* MODULE GRID 50 */
.mgrid{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;margin-bottom:20px;}
.mc2{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:7px 3px;text-align:center;cursor:pointer;transition:.13s;position:relative;}
.mc2:hover{transform:translateY(-2px);border-color:var(--ac);}
.mc2.done{border-color:var(--green);background:rgba(34,197,94,.06);}
.mc2.actv{border-color:var(--gold);background:rgba(245,200,66,.07);}
.mc2 .mn{font-family:'Playfair Display',serif;font-size:.9rem;font-weight:700;}
.mc2 .ms{font-size:.52rem;margin-top:1px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);font-weight:600;}
.mc2.done .mn{color:var(--green);}
.mc2.done .ms{color:var(--green);}
.mc2 .msc{font-size:.52rem;color:var(--gold);font-weight:700;margin-top:1px;}
.mc2.done::after{content:'✓';position:absolute;top:2px;right:4px;font-size:.58rem;color:var(--green);font-weight:700;}

/* EXERCISE PANEL */
.epanel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;animation:up .3s ease both;}
.eptop{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.eptop h3{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;}
.etag{font-size:.6rem;padding:3px 10px;border-radius:20px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;}
.etag-rw{background:rgba(79,142,247,.15);color:var(--blue);border:1px solid rgba(79,142,247,.3);}
.etag-m{background:rgba(249,115,22,.15);color:var(--orange);border:1px solid rgba(249,115,22,.3);}
.etag-w{background:rgba(168,85,247,.15);color:var(--purple);border:1px solid rgba(168,85,247,.3);}
.etag-l{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);}

/* PASSAGE */
.psg{background:var(--bg);border-left:3px solid var(--ac);padding:16px 20px;
  border-radius:0 8px 8px 0;font-size:.86rem;line-height:1.9;color:#b8cce0;
  margin-bottom:16px;max-height:280px;overflow-y:auto;}
.psg p+p{margin-top:10px;}

/* QUESTIONS */
.qblk{margin-bottom:16px;}
.qlbl{font-weight:600;font-size:.84rem;margin-bottom:7px;display:flex;gap:7px;line-height:1.55;}
.qnum{display:inline-flex;align-items:center;justify-content:center;
  background:var(--ac);color:#000;width:20px;height:20px;min-width:20px;
  border-radius:50%;font-size:.62rem;font-weight:700;margin-top:2px;flex-shrink:0;}
.opts{display:flex;flex-direction:column;gap:5px;margin-top:5px;}
.opt{display:flex;align-items:center;gap:9px;padding:9px 12px;
  border:1px solid var(--border);border-radius:7px;cursor:pointer;
  font-size:.82rem;transition:.11s;color:var(--text);user-select:none;}
.opt:hover{border-color:var(--ac);background:rgba(255,255,255,.025);}
.opt.sel{border-color:var(--blue);background:rgba(79,142,247,.08);}
.opt.correct{border-color:var(--green)!important;background:rgba(34,197,94,.09)!important;color:var(--green);}
.opt.wrong{border-color:var(--red)!important;background:rgba(239,68,68,.07)!important;color:#fca5a5;}
.oltr{width:22px;height:22px;border-radius:50%;border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;font-size:.63rem;font-weight:700;flex-shrink:0;}
.tinp{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);
  border-radius:7px;color:var(--text);font-family:inherit;font-size:.84rem;transition:.12s;margin-top:5px;}
.tinp:focus{outline:none;border-color:var(--ac);}
.tinp.ok{border-color:var(--green)!important;background:rgba(34,197,94,.05);}
.tinp.no{border-color:var(--red)!important;background:rgba(239,68,68,.05);}

/* MATH BOX */
.mbox{background:var(--bg);border:1px solid var(--border2);border-radius:8px;
  padding:13px 16px;margin-bottom:12px;font-size:.87rem;line-height:1.85;color:#b8cce0;}
.mbox strong{color:var(--gold);}

/* WRITING */
.wprompt{background:var(--bg);border-left:3px solid var(--purple);
  padding:14px 18px;border-radius:0 8px 8px 0;font-size:.85rem;line-height:1.75;
  color:#b8cce0;margin-bottom:12px;}
textarea.wta{width:100%;padding:12px;background:var(--bg);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-family:inherit;font-size:.84rem;
  line-height:1.7;resize:vertical;min-height:160px;transition:.12s;}
textarea.wta:focus{outline:none;border-color:var(--purple);}
.wcnt{font-size:.7rem;color:var(--text3);text-align:right;margin-top:3px;}
.wtip{padding:7px 11px;border-radius:6px;font-size:.77rem;line-height:1.5;margin-bottom:5px;
  background:rgba(34,197,94,.07);border-left:3px solid var(--green);color:var(--text2);}

/* BUTTONS */
.btn{padding:10px 20px;border-radius:7px;font-family:inherit;font-size:.8rem;font-weight:700;cursor:pointer;border:none;transition:.15s;}
.btn-g{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;}
.btn-g:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(245,200,66,.3);}
.btn-gh{background:transparent;color:var(--text3);border:1px solid var(--border);}
.btn-gh:hover{border-color:var(--text2);color:var(--text);}
.brow{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;}

/* RESULT */
.rbox{margin-top:14px;padding:18px;border-radius:12px;border:1px solid;animation:up .3s ease both;}
.rbox.good{border-color:var(--green);background:rgba(34,197,94,.06);}
.rbox.mid{border-color:var(--gold);background:rgba(245,200,66,.06);}
.rbox.low{border-color:var(--red);background:rgba(239,68,68,.06);}
.rdisplay{display:flex;gap:20px;align-items:center;flex-wrap:wrap;margin-bottom:10px;}
.rscore{font-family:'Playfair Display',serif;font-size:2.5rem;font-weight:700;line-height:1;}
.rfb{padding:7px 11px;border-radius:6px;font-size:.78rem;line-height:1.5;margin-bottom:5px;}
.rfb-ok{background:rgba(34,197,94,.08);border-left:3px solid var(--green);}
.rfb-warn{background:rgba(245,200,66,.08);border-left:3px solid var(--gold);}
.rfb-err{background:rgba(239,68,68,.08);border-left:3px solid var(--red);}
.stbl{width:100%;border-collapse:collapse;font-size:.78rem;margin-top:10px;}
.stbl th{background:var(--surface2);color:var(--gold);padding:7px 10px;text-align:left;border-bottom:1px solid var(--border);}
.stbl td{padding:7px 10px;border-bottom:1px solid var(--border);}

/* PROGRESS PAGE */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;margin:14px 0;}
.pgitem{background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:9px 4px;text-align:center;}
.pgitem.pgd{border-color:var(--green);background:rgba(34,197,94,.05);}
.pgnum{font-family:'Playfair Display',serif;font-size:.9rem;font-weight:700;color:var(--text3);}
.pgitem.pgd .pgnum{color:var(--green);}
.pgscore{font-size:.65rem;font-weight:700;color:var(--gold);margin-top:1px;}
.pgmax{font-size:.56rem;color:var(--text3);}
.psec{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;}
.psec h3{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;margin-bottom:4px;}
.prow{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;align-items:center;justify-content:space-between;}
.pstat{text-align:center;}
.pstat-n{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;}
.pstat-l{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;}
.ptrack{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin:10px 0;}
.pfill{height:100%;border-radius:3px;transition:width .7s ease;}

/* EXPLAIN */
.explain{padding:7px 11px;border-radius:6px;font-size:.77rem;line-height:1.5;margin-top:6px;
  background:rgba(79,142,247,.07);border-left:3px solid var(--blue);color:var(--text2);}

@media(max-width:680px){
  .mgrid{grid-template-columns:repeat(5,1fr);}
  .dhero h1{font-size:1.9rem;}
  #mc{padding:14px 10px;}
  .hdr{padding:0 14px;}
  .acard{padding:28px 20px;}
}
</style>
</head>
<body>
<div id="authWrap" class="hidden"></div>
<div id="app" class="hidden">
  <header class="hdr">
    <div class="hlogo" onclick="goHome()">SAT <em>MASTER</em></div>
    <div id="uchip"></div>
  </header>
  <nav class="nav">
    <button class="ntab act" id="nt0" onclick="goSec('home')">🏠 Dashboard</button>
    <button class="ntab" id="nt1" onclick="goSec('rw')">📖 Reading &amp; Writing <span class="nbdg" id="rwb">0/50</span></button>
    <button class="ntab" id="nt2" onclick="goSec('math')">🔢 Math <span class="nbdg" style="background:var(--orange);color:#fff" id="mb">0/50</span></button>
    <button class="ntab" id="nt3" onclick="goSec('writing')">✍️ Essay <span class="nbdg" style="background:var(--purple)" id="wb">0/50</span></button>
    <button class="ntab" id="nt4" onclick="goSec('lang')">📝 Language <span class="nbdg" style="background:var(--green);color:#fff" id="lb">0/50</span></button>
    <button class="ntab" id="nt5" onclick="goSec('progress')">📊 My Scores</button>
  </nav>
  <div id="mc"></div>
</div>
<script>
// ═══════════════════════════════════════════
// READING & WRITING — 50 Modules
// ═══════════════════════════════════════════
const RW=[
{t:"The Impact of Social Media on Democracy",p:`Social media platforms have fundamentally altered the landscape of democratic participation. On one hand, platforms like Twitter and Facebook have democratized information sharing, allowing citizens to bypass traditional media gatekeepers and communicate directly with elected officials. The Arab Spring of 2010-2012 demonstrated social media's capacity to organize mass political movements with unprecedented speed.\n\nHowever, scholars increasingly warn of serious threats to democratic health. Filter bubbles — algorithmic systems that show users content aligned with their existing beliefs — create ideological echo chambers that reduce exposure to opposing viewpoints. A landmark 2018 study by MIT researchers found that false information spreads six times faster on Twitter than accurate information.\n\nFurthermore, foreign state actors have exploited social media's openness to interfere in democratic elections. The United States Intelligence Community concluded that Russia's Internet Research Agency created thousands of fake accounts to sow division during the 2016 presidential election, reaching an estimated 126 million Americans on Facebook alone.`,

{t:"Photosynthesis and Plant Energy",p:`Photosynthesis is the process by which plants, algae, and some bacteria convert light energy into chemical energy stored as glucose. The overall chemical equation is: 6CO₂ + 6H₂O + light energy → C₆H₁₂O₆ + 6O₂. This process occurs primarily in chloroplasts, organelles containing the green pigment chlorophyll.\n\nThe process involves two main stages. The light-dependent reactions occur in the thylakoid membranes, where light energy is captured and used to produce ATP and NADPH while splitting water molecules and releasing oxygen. The light-independent reactions, also called the Calvin cycle, take place in the stroma and use the ATP and NADPH produced to convert carbon dioxide into glucose.\n\nFactors that affect the rate of photosynthesis include light intensity, carbon dioxide concentration, temperature, and water availability. At very high temperatures, enzymes involved in photosynthesis denature and activity decreases. Climate scientists are concerned that rising global temperatures may reduce photosynthetic efficiency in many plant species, potentially disrupting food chains and carbon cycles.`,

],ms:50},

{t:"The Economics of Minimum Wage",p:`The debate over minimum wage has occupied economists for decades. Classical economic theory predicts that setting a price floor above market equilibrium — which is what minimum wage laws do — will cause unemployment, as employers hire fewer workers when labor becomes more expensive. This model dominated academic thinking for much of the twentieth century.\n\nHowever, influential research by economists David Card and Alan Krueger in 1994 challenged this consensus. Comparing employment in fast-food restaurants in New Jersey (which raised its minimum wage) to neighboring Pennsylvania (which did not), they found no significant reduction in employment following the wage increase. This "natural experiment" approach was groundbreaking and helped Card win the Nobel Prize in Economics in 2021.\n\nMore recent studies have produced mixed findings. A 2019 analysis of Seattle's gradual minimum wage increase to $15 found modest positive effects on worker earnings with minimal job losses overall, though some research found negative effects on hours worked for the lowest-paid workers. Economists now largely agree that the employment effects of moderate minimum wage increases are smaller than originally predicted by classical theory, though debate continues about the appropriate national level.`,
qs:[
{t:"mcq",q:"What did Card and Krueger compare in their 1994 study?",o:["Manufacturing firms in two states","Fast-food restaurants in New Jersey and Pennsylvania","Office workers in New York and New Jersey","Retail stores across multiple states"],a:"Fast-food restaurants in New Jersey and Pennsylvania"},
{t:"mcq",q:"What award did David Card receive in 2021?",o:["Pulitzer Prize","Fields Medal","Nobel Prize in Economics","MacArthur Fellowship"],a:"Nobel Prize in Economics"},
{t:"mcq",q:"What does classical economic theory predict about minimum wage laws?",o:["They have no effect on employment","They increase employment","They cause unemployment","They reduce inequality without side effects"],a:"They cause unemployment"},
{t:"mcq",q:"What did a 2019 analysis find about Seattle's $15 minimum wage?",o:["Significant job losses","Modest positive effects on earnings with minimal job losses","No change in employment or wages","Negative effects on all workers"],a:"Modest positive effects on earnings with minimal job losses"},
{t:"short",q:"What is meant by a 'price floor' in economics?",a:"setting minimum price above market equilibrium / minimum wage set above what market would set"}
],ms:50},

{t:"Black Holes: Extreme Gravity",p:`Black holes are regions of spacetime where gravity is so strong that nothing — not even light — can escape once it crosses the boundary known as the event horizon. They form when massive stars exhaust their nuclear fuel and collapse under their own gravity. The star's mass, compressed into an infinitely small point called a singularity, creates extreme curvature in spacetime.\n\nStephen Hawking's theoretical work in the 1970s produced a surprising result: black holes are not entirely black. Quantum mechanical effects near the event horizon cause black holes to slowly emit radiation — now called Hawking radiation — meaning they very gradually lose mass over astronomically long time periods. For stellar-mass black holes, this process would take longer than the current age of the universe.\n\nThe first direct image of a black hole's shadow was captured in 2019 by the Event Horizon Telescope collaboration, revealing the supermassive black hole at the center of galaxy M87, which contains a mass approximately 6.5 billion times that of our sun. This confirmation of black holes' physical reality was celebrated as one of the greatest astronomical achievements of the decade.`,

{t:"mcq",q:"How many times the mass of our sun does the M87 black hole contain?",o:["500 million","1.5 billion","6.5 billion","10 billion"],a:"6.5 billion"},
{t:"short",q:"What is the infinitely small point at the center of a black hole called?",a:"singularity"}
],ms:50},

{t:"Ocean Plastic Pollution",p:`Marine plastic pollution has reached crisis proportions. Approximately 8 million metric tons of plastic enter the ocean each year, adding to an estimated 150 million metric tons already present. Plastics persist in the marine environment for hundreds to thousands of years, fragmenting into increasingly small particles called microplastics rather than fully biodegrading.\n\nThe Great Pacific Garbage Patch — a concentration of marine debris in the North Pacific Ocean — is often mischaracterized as a solid island of trash. In reality, it is more like a plastic soup, with debris distributed throughout the water column, much of it invisible to the naked eye. The patch covers an estimated 1.6 million square kilometers, an area larger than Texas.\n\nThe ecological consequences are severe. Marine animals ingest plastic directly, mistaking it for food, or become entangled in larger debris. Microplastics have been detected in the tissues of fish, seabirds, marine mammals, and even zooplankton at the base of the food chain. A 2021 study detected microplastics in human blood for the first time, though the health implications remain under investigation.`,

function doLogin(){
  const un=(document.getElementById('lu').value||'').trim();
  const pw=document.getElementById('lp').value||'';
  if(!un||!pw){showLogin('⚠️ Please enter username and password.');return;}
  if(un.toLowerCase()==='dreamcatcher'){
    if(pw===MASTER.password)loginOk({username:MASTER.username,name:MASTER.name,email:MASTER.email,role:'admin'});
    else showLogin('❌ Incorrect password.');return;
  }
  const u=findUser(un);
  if(!u){showLogin(`❌ Username "${un}" not found. Please register.`);return;}
  if(!u.verified){showLogin('❌ Please verify your email first.');return;}
  if(u.password!==btoa(pw)){showLogin('❌ Incorrect password.');return;}
  loginOk(u);
}

function doReg(){
  const n=(document.getElementById('rn').value||'').trim();
  const e=(document.getElementById('re').value||'').trim();
  const u=(document.getElementById('ru').value||'').trim().toLowerCase();
  const p=document.getElementById('rp').value||'';
  const p2=document.getElementById('rp2').value||'';
  const pf={n,e,u};
  if(!n||!e||!u||!p){showReg('⚠️ All fields required.',pf);return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)){showReg('⚠️ Invalid email.',pf);return;}
  if(u==='dreamcatcher'){showReg('⚠️ Username reserved.',pf);return;}
  if(u.length<3||/\s/.test(u)){showReg('⚠️ Username: 3+ chars, no spaces.',pf);return;}
  if(p.length<6){showReg('⚠️ Password: min 6 characters.',pf);return;}
  if(p!==p2){showReg('⚠️ Passwords do not match.',pf);return;}
  if(findUser(u)){showReg(`⚠️ Username "${u}" taken. Try another.`,pf);return;}
  showVerify({name:n,email:e,username:u,password:btoa(p),verified:false,joined:new Date().toISOString()});
}

      <div class="mn" ${isAct?"style='color:var(--gold)'":""}>${i+1}</div>
      <div class="ms">${isDone?'Done':isAct?'Open':'Go'}</div>
      ${isDone&&sc!==undefined?`<div class="msc">${sc}/${info.data[i]?.ms||50}</div>`:''}
    </div>`;
  }).join('');

  let panel='';
  if(ai!==null&&ai!==undefined){
    if(k==='rw')panel=rwPanel(ai);
    else if(k==='math')panel=mathPanel(ai);
    else if(k==='writing')panel=writePanel(ai);
    else if(k==='lang')panel=langPanel(ai);
  }

  document.getElementById('mc').innerHTML=`
  <div class="shdr">
    <div><h2>${info.icon} ${info.name}</h2>
    <p>50 modules · Up to 50 pts each · Click any number to open that module</p></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <div class="sbox"><div class="sbig" style="color:${info.col}">${done.length}/50</div><div class="slbl">Done</div></div>
      <div class="sbox"><div class="sbig">${total}</div><div class="slbl">Score pts</div></div>
    </div>
  </div>
  <div class="mgrid">${grid}</div>
  <div id="mpanel">${panel}</div>`;
}

function openMod(k,i){curMod[k]=i;selMap={};renderSection(k);setTimeout(()=>{const p=document.getElementById('mpanel');if(p)p.scrollIntoView({behavior:'smooth',block:'start'});},100);}

// ═══════════════════════════════════════════
// READING & WRITING PANEL
// ═══════════════════════════════════════════
function rwPanel(i){
  const ex=RW[i];
  if(!ex)return'';
  const L=['A','B','C','D'];
  const qh=ex.qs.map((q,qi)=>{
    if(q.t==='mcq')return`<div class="qblk">
      <div class="qlbl"><span class="qnum" style="background:var(--blue);color:#fff">${qi+1}</span>${q.q}</div>
      <div class="opts">${q.o.map((o,oi)=>`<div class="opt" data-v="${o}" onclick="selOpt('rw',${i},${qi},this)">
        <span class="oltr">${L[oi]}</span>${o}</div>`).join('')}</div>
    </div>`;
    return`<div class="qblk">
      <div class="qlbl"><span class="qnum" style="background:var(--blue);color:#fff">${qi+1}</span>${q.q}</div>
      <input class="tinp" id="sa_rw_${i}_${qi}" type="text" placeholder="Your answer…" style="--ac:var(--rw)"/>
    </div>`;
  }).join('');
  return`<div class="epanel">
    <div class="eptop"><h3>Module ${i+1} — ${ex.t}</h3><span class="etag etag-rw">Reading & Writing</span></div>
    <div class="psg" style="--ac:var(--rw)">${ex.p.split('\n').map(p=>`<p>${p}</p>`).join('')}</div>
    ${qh}
    <div class="brow">
      <button class="btn btn-g" onclick="checkRW(${i})">Submit & Score ✓</button>
      <button class="btn btn-gh" onclick="openMod('rw',${i})">Reset</button>
    </div>
    <div id="res_rw_${i}"></div>
  </div>`;
}

function selOpt(k,mi,qi,el){
  selMap[`${k}_${mi}_${qi}`]=el.dataset.v;
  el.closest('.opts').querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
}

function checkRW(i){
  const ex=RW[i];let correct=0;
  ex.qs.forEach((q,qi)=>{
    const sel=selMap[`rw_${i}_${qi}`];
    const inp=document.getElementById(`sa_rw_${i}_${qi}`);
    const uv=(sel||(inp?inp.value:'')).toLowerCase().trim();
    const av=(q.a||'').toLowerCase();
    const ok=uv===av||av.split('/').map(a=>a.trim()).some(a=>uv.includes(a)||a.includes(uv));
    if(q.t==='mcq'){
      document.querySelectorAll(`#mpanel .qblk`)[qi].querySelectorAll('.opt').forEach(o=>{
        if(o.dataset.v===q.a)o.classList.add('correct');
        if(o.classList.contains('sel')&&o.dataset.v!==q.a)o.classList.add('wrong');
      });
    }else if(inp){inp.classList.add(ok?'ok':'no');if(!ok)inp.placeholder='Expected: '+q.a;}
    if(ok)correct++;
  });
  const pts=Math.round(correct/ex.qs.length*ex.ms);
  showRes(`res_rw_${i}`,correct,ex.qs.length,pts,ex.ms,'rw');
  recordScore('rw',i,pts);
}

// ═══════════════════════════════════════════
// MATH PANEL
// ═══════════════════════════════════════════
function mathPanel(i){
  const ex=MATH[i];if(!ex)return'';
  const L=['A','B','C','D'];
  const qh=ex.probs.map((p,pi)=>`<div class="qblk">
    <div class="qlbl"><span class="qnum" style="background:var(--orange);color:#fff">${pi+1}</span>${p.q}</div>
    ${p.h?`<div style="font-size:.72rem;color:var(--text3);margin:3px 0 7px;padding-left:27px">💡 ${p.h}</div>`:''}
    <div class="opts">${p.o.map((o,oi)=>`<div class="opt" data-v="${o}" onclick="selOpt('math',${i},${pi},this)">
      <span class="oltr">${L[oi]}</span>${o}</div>`).join('')}</div>
  </div>`).join('');
  return`<div class="epanel">
    <div class="eptop"><h3>Module ${i+1} — ${ex.t}</h3><span class="etag etag-m">Math</span></div>
    <div class="mbox">📐 <strong>Tip:</strong> Apply PEMDAS, identify known/unknown, and check your answer by substitution.</div>
    ${qh}
    <div class="brow">
      <button class="btn btn-g" onclick="checkMath(${i})">Submit & Score ✓</button>
      <button class="btn btn-gh" onclick="openMod('math',${i})">Reset</button>
    </div>
    <div id="res_math_${i}"></div>
  </div>`;
}

function checkMath(i){
  const ex=MATH[i];let correct=0;
  ex.probs.forEach((p,pi)=>{
    const sel=selMap[`math_${i}_${pi}`];
    const ok=sel===p.a;
    document.querySelectorAll('#mpanel .qblk')[pi].querySelectorAll('.opt').forEach(o=>{
      if(o.dataset.v===p.a)o.classList.add('correct');
      if(o.classList.contains('sel')&&o.dataset.v!==p.a)o.classList.add('wrong');
    });
    if(ok)correct++;
  });
  const pts=Math.round(correct/ex.probs.length*ex.ms);
  showRes(`res_math_${i}`,correct,ex.probs.length,pts,ex.ms,'math');
  recordScore('math',i,pts);
}

// ═══════════════════════════════════════════
// WRITING PANEL
// ═══════════════════════════════════════════
function writePanel(i){
  const ex=WRITE[i];if(!ex)return'';
  const tips=ex.tips.map(t=>`<div class="wtip">💡 ${t}</div>`).join('');
  return`<div class="epanel">
    <div class="eptop"><h3>Module ${i+1} — ${ex.t}</h3><span class="etag etag-w">Essay Writing</span></div>
    <div class="wprompt">✍️ <strong>Prompt:</strong> ${ex.prompt}</div>
    <div style="margin-bottom:12px">${tips}</div>
    <div style="font-size:.68rem;color:var(--text3);letter-spacing:1px;text-transform:uppercase;font-weight:700;margin-bottom:6px">Your Essay — minimum ${ex.minW} words</div>
    <textarea class="wta" id="wt_${i}" rows="10" placeholder="Write your essay here. Take a clear position and support it with specific, well-developed examples…" oninput="wc(this,${ex.minW},'wc_${i}')"></textarea>
    <div class="wcnt" id="wc_${i}">0 / ${ex.minW} words minimum</div>
    <div class="brow">
      <button class="btn btn-g" onclick="scoreWrite(${i})">📊 Score My Essay</button>
      <button class="btn btn-gh" onclick="document.getElementById('wt_${i}').value='';document.getElementById('wc_${i}').textContent='0 / ${ex.minW} words minimum'">Clear</button>
    </div>
    <div id="res_writing_${i}"></div>
  </div>`;
}

function wc(el,min,id){
  const w=el.value.trim()?el.value.trim().split(/\s+/).length:0;
  const d=document.getElementById(id);
  d.textContent=`${w} / ${min} words minimum`;
  d.style.color=w>=min?'var(--green)':'var(--red)';
}

function scoreWrite(i){
  const ex=WRITE[i];
  const txt=(document.getElementById(`wt_${i}`).value||'').trim();
  if(!txt||txt.split(/\s+/).length<30){alert('Write at least 30 words before scoring.');return;}
  const w=txt.split(/\s+/).length;
  const hasLink=/however|furthermore|moreover|although|therefore|consequently|in addition|nevertheless|additionally|on the other hand/i.test(txt);
  const hasEg=/for example|for instance|such as|notably|to illustrate|specifically|in particular/i.test(txt);
  const hasOpin=/i believe|i think|in my opinion|i would argue|i contend|my view|i maintain|it is clear/i.test(txt);
  const hasCon=/in conclusion|to conclude|in summary|overall|to sum up|in closing|ultimately/i.test(txt);
  const sents=txt.split(/[.!?]+/).filter(s=>s.trim().length>8).length;
  let r=6,an=6,wr=6;
  if(w>=ex.minW)r=7;if(w>=ex.minW+100)r=8;if(w<ex.minW)r=4;
  if(hasEg)an=7;if(hasOpin&&hasEg)an=8;
  if(hasLink)wr=7;if(hasLink&&hasCon)wr=8;if(sents>8)wr=Math.min(wr+0.5,8);
  const avg=Math.round(((r+an+wr)/3)*10)/10;
  const pts=Math.round((avg/8)*ex.ms);
  const cls=avg>=7?'good':avg>=5?'mid':'low';
  document.getElementById(`res_writing_${i}`).innerHTML=`
    <div class="rbox ${cls}">
      <div class="rdisplay">
        <div><div class="rscore" style="color:var(--gold)">${pts}/${ex.ms}</div><div style="font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-top:3px">Points Earned</div></div>
        <div style="font-size:.82rem;color:var(--text2);line-height:1.6">Score: ${avg}/8 avg across three criteria</div>
      </div>
      ${w<ex.minW?`<div class="rfb rfb-err">⚠️ Below word count: ${w}/${ex.minW} words</div>`:''}
      <table class="stbl">
        <thead><tr><th>Criterion</th><th>/8</th><th>Feedback</th></tr></thead>
        <tbody>
          <tr><td><strong>Reading</strong></td><td>${r}</td><td>${w>=ex.minW?'Good length.':'Write more.'}${hasEg?' Evidence used.':''}</td></tr>
          <tr><td><strong>Analysis</strong></td><td>${an}</td><td>${hasEg?'Examples cited.':'Add specific examples.'}${hasOpin?' Position stated.':' State your position clearly.'}</td></tr>
          <tr><td><strong>Writing</strong></td><td>${wr}</td><td>${hasLink?'Transitions used.':'Use: furthermore, however, consequently...'}${hasCon?' Strong conclusion.':' Add a conclusion paragraph.'}</td></tr>
        </tbody>
      </table>
    </div>`;
  recordScore('writing',i,pts);
}

// ═══════════════════════════════════════════
// LANGUAGE PANEL
// ═══════════════════════════════════════════
function langPanel(i){
  const ex=LANG[i];if(!ex)return'';
  const L=['A','B','C','D'];
  const qh=ex.qs.map((q,qi)=>`<div class="qblk">
    <div class="qlbl"><span class="qnum" style="background:var(--green);color:#000">${qi+1}</span>${q.q}</div>
    <div class="opts">${q.o.map((o,oi)=>`<div class="opt" data-v="${o}" onclick="selOpt('lang',${i},${qi},this)">
      <span class="oltr">${L[oi]}</span>${o}</div>`).join('')}</div>
  </div>`).join('');
  return`<div class="epanel">
    <div class="eptop"><h3>Module ${i+1} — ${ex.t}</h3><span class="etag etag-l">Language</span></div>
    ${qh}
    <div class="brow">
      <button class="btn btn-g" onclick="checkLang(${i})">Submit & Score ✓</button>
      <button class="btn btn-gh" onclick="openMod('lang',${i})">Reset</button>
    </div>
    <div id="res_lang_${i}"></div>
  </div>`;
}

function checkLang(i){
  const ex=LANG[i];let correct=0;
  ex.qs.forEach((q,qi)=>{
    const sel=selMap[`lang_${i}_${qi}`];
    const ok=sel===q.a;
    const qblks=document.querySelectorAll('#mpanel .qblk');
    if(qblks[qi]){
      qblks[qi].querySelectorAll('.opt').forEach(o=>{
        if(o.dataset.v===q.a)o.classList.add('correct');
        if(o.classList.contains('sel')&&o.dataset.v!==q.a)o.classList.add('wrong');
      });
      if(q.ex&&!qblks[qi].querySelector('.explain')){
        const d=document.createElement('div');
        d.className=`explain`;d.textContent=`📌 ${q.ex}`;
        qblks[qi].appendChild(d);
      }
    }
    if(ok)correct++;
  });
  const pts=Math.round(correct/ex.qs.length*ex.ms);
  showRes(`res_lang_${i}`,correct,ex.qs.length,pts,ex.ms,'lang');
  recordScore('lang',i,pts);
}

// ═══════════════════════════════════════════
// RESULT BOX
// ═══════════════════════════════════════════
function showRes(id,correct,total,pts,ms,k){
  const pct=Math.round(correct/total*100);
  const cls=pct>=80?'good':pct>=60?'mid':'low';
  const cols={rw:'var(--blue)',math:'var(--orange)',writing:'var(--purple)',lang:'var(--green)'};
  const msgs=['🎉 Excellent!','⭐ Outstanding!','👍 Good effort!','📚 Keep practicing!','💪 Don\'t give up!'];
  document.getElementById(id).innerHTML=`
    <div class="rbox ${cls}">
      <div class="rdisplay">
        <div><div class="rscore" style="color:${cols[k]}">${correct}/${total}</div>
          <div style="font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-top:3px">Correct</div></div>
        <div><div class="rscore" style="color:var(--gold)">${pts}</div>
          <div style="font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-top:3px">Points / ${ms}</div></div>
        <div style="font-size:.84rem;color:var(--text2);line-height:1.6">
          <strong style="font-size:1.1rem;color:${pct>=80?'var(--green)':pct>=60?'var(--gold)':'var(--red)'}">${pct}%</strong><br/>
          ${msgs[pct>=90?0:pct>=75?1:pct>=60?2:pct>=40?3:4]}
        </div>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════
// RECORD SCORE
// ═══════════════════════════════════════════
function recordScore(k,i,pts){
  ensureST();
  if(!ST[k].done.includes(i))ST[k].done.push(i);
  ST[k].scores[i]=pts;
  saveState();updateBadges();
}

// ═══════════════════════════════════════════
// PROGRESS PAGE — scores per module
// ═══════════════════════════════════════════
function renderProgress(){
  ensureST();
  const sections=[
    {k:'rw',name:'Reading & Writing',col:'#4f8ef7',data:RW},
    {k:'math',name:'Math',col:'#f97316',data:MATH},
    {k:'writing',name:'Essay Writing',col:'#a855f7',data:WRITE},
    {k:'lang',name:'Language & Grammar',col:'#22c55e',data:LANG}
  ];
  const gt=grandTotal();
  const gm=sections.reduce((a,s)=>a+secMaxDone(s.k,s.data),0)||1;
  const gd=grandDone();

  const secBlocks=sections.map(s=>{
    const done=ST[s.k].done,scores=ST[s.k].scores||{};
    const tot=secTotal(s.k);
    const mp=secMaxDone(s.k,s.data)||1;
    const avg=done.length?Math.round(tot/done.length):0;
    const best=done.length?Math.max(...done.map(i=>scores[i]||0)):0;
    const p=Math.round(done.length/50*100);

    // Score grid for all 50 modules
    const scoreGrid=Array.from({length:50},(_,i)=>{
      const isDone=done.includes(i);
      const sc=scores[i];
      const ms=s.data[i]?.ms||50;
      return`<div class="pgitem ${isDone?'pgd':''}">
        <div class="pgnum">${i+1}</div>
        ${isDone?`<div class="pgscore">${sc}/${ms}</div>`:'<div class="pgmax">—</div>'}
      </div>`;
    }).join('');

    return`<div class="psec">
      <div class="prow">
        <div><h3 style="color:${s.col}">${s.name}</h3>
          <p style="font-size:.76rem;color:var(--text2);margin-top:2px">${done.length}/50 modules completed</p></div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <div class="sbox"><div class="sbig" style="color:${s.col}">${tot}</div><div class="slbl">Total Score</div></div>
          <div class="sbox"><div class="sbig" style="color:var(--text2)">${avg}</div><div class="slbl">Avg/Module</div></div>
          <div class="sbox"><div class="sbig" style="color:var(--gold)">${best}</div><div class="slbl">Best Score</div></div>
        </div>
      </div>
      <div class="ptrack"><div class="pfill" style="width:${p}%;background:${s.col}"></div></div>
      <div style="font-size:.68rem;color:var(--text3);margin-bottom:10px">Each box shows: module number / score achieved / max score</div>
      <div class="pgrid">${scoreGrid}</div>
    </div>`;
  }).join('');

  document.getElementById('mc').innerHTML=`
  <div class="shdr">
    <div><h2>📊 My Progress & Scores</h2>
    <p>Score achieved in every module — green = completed, number shows your score.</p></div>
  </div>

  <div class="gbar" style="margin-bottom:20px">
    <div><div class="gscore">${gt}</div><div class="glbl">Grand Total</div></div>
    <div class="gpbar">
      <div style="display:flex;justify-content:space-between;font-size:.7rem;color:var(--text2);margin-bottom:2px">
        <span>Overall Score</span><span style="color:var(--gold);font-weight:700">${Math.round(gt/gm*100)||0}% of max earned</span>
      </div>
      <div class="gpbar-track"><div class="gpbar-fill" style="width:${Math.round(gt/gm*100)||0}%"></div></div>
      <div style="font-size:.66rem;color:var(--text3)">${gd}/200 modules completed</div>
    </div>
    <div class="gstats">
      ${sections.map(s=>`<div class="gst">
        <div class="gst-n" style="color:${s.col}">${secTotal(s.k)}</div>
        <div class="gst-l">${s.name.split(' ')[0]}</div>
      </div>`).join('')}
    </div>
  </div>
  ${secBlocks}`;
}

    const s=localStorage.getItem('satm_sess');
